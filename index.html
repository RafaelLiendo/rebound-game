<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Permeation Buoyancy Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f4f0df;
      --muted: #b8c7b8;
      --panel: rgba(14, 19, 25, 0.76);
      --line: rgba(244, 240, 223, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: hidden;
      background:
        radial-gradient(circle at 28% 18%, rgba(220, 96, 66, 0.24), transparent 32%),
        linear-gradient(145deg, #10161d 0%, #172419 48%, #101820 100%);
      color: var(--ink);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    .shell {
      position: relative;
      width: min(100vw - 36px, 1180px);
      aspect-ratio: 16 / 9;
      min-height: 280px;
      max-height: calc(100vh - 36px);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #121820;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    .hud {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 14px;
      display: grid;
      grid-template-columns: 250px 1fr 400px;
      grid-template-areas:
        "readout . controls";
      gap: 18px;
      align-items: start;
      pointer-events: none;
    }

    .readout,
    .controls {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(14, 19, 25, 0.78);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
    }

    .readout {
      grid-area: readout;
      display: grid;
      gap: 6px;
      padding: 8px 10px;
    }

    .status {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    #stateLabel {
      flex: 0 0 auto;
      min-width: 98px;
      color: #111820;
      border-radius: 6px;
      background: #f0c85f;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-align: center;
      text-transform: uppercase;
    }

    #messageLabel {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meter {
      width: min(100%, 220px);
      height: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px) 0 0 / 32px 100%,
        rgba(14, 19, 25, 0.8);
    }

    #pressureFill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: 7px;
      background: linear-gradient(90deg, #68d391, #f0c85f 65%, #e85f5c);
      transition: width 90ms linear;
    }

    .controls {
      grid-area: controls;
      display: grid;
      grid-template-rows: repeat(2, minmax(0, 1fr));
      grid-auto-flow: column;
      gap: 3px 12px;
      width: 100%;
      padding: 8px 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.1;
      pointer-events: none;
    }

    .control {
      display: flex;
      gap: 6px;
      align-items: center;
      min-width: 0;
      min-height: 18px;
    }

    .control:nth-child(-n + 2) {
      grid-column: span 1;
    }

    .control:nth-child(n + 3) {
      grid-column: span 2;
    }

    .key {
      flex: 0 0 auto;
      min-width: 28px;
      border: 1px solid rgba(244, 240, 223, 0.36);
      border-radius: 4px;
      background: rgba(244, 240, 223, 0.92);
      color: #111820;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 900;
      line-height: 15px;
      text-align: center;
      white-space: nowrap;
    }

    .control-copy {
      display: flex;
      gap: 4px;
      align-items: baseline;
      min-width: 0;
      overflow: hidden;
    }

    .control-name,
    .control-hint {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .control-name {
      color: var(--ink);
      font-weight: 850;
    }

    .control-hint {
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
    }

    @media (max-width: 980px) {
      .hud {
        grid-template-columns: minmax(240px, 420px) 1fr;
        grid-template-areas:
          "readout ."
          "controls controls";
      }
      .controls {
        display: none;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .shell {
        width: calc(100vw - 20px);
        max-height: calc(100vh - 20px);
      }

      .hud {
        left: 10px;
        right: 10px;
        top: 10px;
        grid-template-columns: minmax(0, 1fr);
        grid-template-areas:
          "readout"
          "controls";
        gap: 8px;
      }

      .meter {
        width: min(100%, 220px);
      }

      #messageLabel,
      .controls {
        font-size: 12px;
      }

      .controls {
        display: none;
        grid-template-rows: none;
        grid-template-columns: 1fr;
        grid-auto-flow: row;
      }

      .control,
      .control:nth-child(-n + 2),
      .control:nth-child(n + 3) {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <canvas id="game" width="960" height="540" aria-label="Permeation buoyancy game demo"></canvas>
    <section class="hud" aria-label="Game status">
      <div class="readout">
        <div class="meter" aria-label="pressure">
          <span id="pressureFill"></span>
        </div>
        <div class="status">
          <span id="stateLabel">solid</span>
          <span id="messageLabel">find the pressure in the ground</span>
        </div>
      </div>
      <div class="controls">
        <span class="control">
          <span class="key">&larr;</span>
          <span class="key">&rarr;</span>
          <span class="control-copy">
            <span class="control-name">Move</span>
          </span>
        </span>
        <span class="control">
          <span class="key">&nbsp;&nbsp;&nbsp;&nbsp;Space&nbsp;&nbsp;&nbsp;&nbsp;</span>
          <span class="control-copy">
            <span class="control-name">Jump</span>
          </span>
        </span>
        <span class="control">
          <span class="key">Shift</span>
          <span class="control-copy">
            <span class="control-name">Permeate</span>
            <span class="control-hint">hold to sink, release to rebound</span>
          </span>
        </span>
        <span class="control">
          <span class="key">Ctrl+Shift</span>
          <span class="control-copy">
            <span class="control-name">Chain</span>
            <span class="control-hint">Permeate/Rebound</span>
          </span>
        </span>
      </div>
    </section>
  </main>
  <script>
  (function () {
    "use strict";

    // === CONFIG ===
    var CONFIG = {
      TILE_SIZE: 32,
      VIEW_W: 960,
      VIEW_H: 540,
      GRAVITY: 0.5,
      MAX_FALL_SPEED: 12,
      MOVE_ACCEL: 0.8,
      MOVE_DECEL: 1.2,
      MAX_RUN_SPEED: 5,
      JUMP_VELOCITY: -10,
      JUMP_CUT_VELOCITY: -3.5,
      COYOTE_FRAMES: 6,
      JUMP_BUFFER_FRAMES: 6,
      REBOUND_AIR_CONTROL: 0.5,
      REBOUND_STATE_DURATION: 0.4,
      BUOYANCY_ACCEL: 1.2,
      BUOYANCY_DEPTH_ACCEL: 0.8,
      BUOYANCY_MIN_SPEED: 12,
      BUOYANCY_MAX_SPEED: 18,
      PERMEATE_DRAG: 0.08,
      PERMEATE_PULL_ACCEL: 0.3,
      STUCK_SEARCH_RADIUS: 6,
      STUCK_DURATION: 0.5,
      PLAYER_W: 24,
      PLAYER_H: 40,
      DT: 1 / 60
    };

    var TS = CONFIG.TILE_SIZE;
    var canvas = document.getElementById("game");
    var ctx = canvas.getContext("2d");
    var stateLabel = document.getElementById("stateLabel");
    var messageLabel = document.getElementById("messageLabel");
    var pressureFill = document.getElementById("pressureFill");
    var particles = [];
    var ripples = [];
    var shake = 0;

    // === LEVEL DATA ===
    var LEVEL = [
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "...........................G..",
      "........................######",
      "..............................",
      "..............................",
      "..............................",
      "..............................",
      "........######################",
      "....##########################",
      "........######################",
      "........######################",
      "....##########################",
      "..............................",
      "..............................",
      "####..........................",
      "..............................",
      "..............................",
      "....###.......................",
      "..............................",
      "..............................",
      "####..........................",
      "..............................",
      "..............................",
      "....###.......................",
      "..............................",
      "..............................",
      "####..........................",
      "..............................",
      "..............................",
      "....###..######...............",
      "..............................",
      ".S............................",
      "##############################"
    ];

    var ROWS = LEVEL.length;
    var COLS = LEVEL[0].length;
    var levelH = ROWS * TS;
    var levelW = COLS * TS;
    var tiles = [];
    var spawnCell = { c: 1, r: 43, x: TS, y: 43 * TS };
    var goalRect = { x: 27 * TS, y: 13 * TS, w: TS, h: TS };

    function parseLevel() {
      tiles = [];
      for (var r = 0; r < ROWS; r++) {
        tiles[r] = [];
        for (var c = 0; c < COLS; c++) {
          var ch = LEVEL[r][c];
          tiles[r][c] = ch === "#";
          if (ch === "S") spawnCell = { c: c, r: r, x: c * TS, y: r * TS };
          if (ch === "G") goalRect = { x: c * TS, y: r * TS, w: TS, h: TS };
        }
      }
    }
    parseLevel();

    // === INPUT ===
    var keys = Object.create(null);
    var keyEdge = Object.create(null);
    var keyReleased = Object.create(null);

    window.addEventListener("keydown", function (ev) {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "ShiftLeft", "ShiftRight", "ControlLeft", "ControlRight", "KeyA", "KeyD", "KeyW", "KeyR"].indexOf(ev.code) >= 0) {
        ev.preventDefault();
      }
      if (!keys[ev.code]) keyEdge[ev.code] = true;
      keys[ev.code] = true;
    });

    window.addEventListener("keyup", function (ev) {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "ShiftLeft", "ShiftRight", "ControlLeft", "ControlRight", "KeyA", "KeyD", "KeyW", "KeyR"].indexOf(ev.code) >= 0) {
        ev.preventDefault();
      }
      keys[ev.code] = false;
      keyReleased[ev.code] = true;
    });

    function permeateHeld() {
      return !!(keys.ShiftLeft || keys.ShiftRight);
    }

    function permeatePressed() {
      return !!(keyEdge.ShiftLeft || keyEdge.ShiftRight);
    }

    function permeateReleased() {
      return !!(keyReleased.ShiftLeft || keyReleased.ShiftRight);
    }

    function jumpPressed() {
      return !!(keyEdge.Space || keyEdge.KeyW || keyEdge.ArrowUp);
    }

    function jumpReleased() {
      return !!(keyReleased.Space || keyReleased.KeyW || keyReleased.ArrowUp);
    }

    function assistHeld() {
      return !!(keys.ControlLeft || keys.ControlRight);
    }

    // === PLAYER STATE ===
    var player = {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      state: "solid",
      facing: 1,
      grounded: false,
      won: false,
      coyoteTimer: 0,
      jumpBufferTimer: 0,
      reboundAirborneTimer: 0,
      reboundSurfaced: false,
      queuedPermeate: false,
      queuedPermeateSource: null,
      permeateUntilClear: false,
      embeddedDepth: 0,
      reboundStrength: 0,
      stuckTimer: 0,
      flashTimer: 0
    };

    function spawnPlayer() {
      player.x = spawnCell.x + (TS - CONFIG.PLAYER_W) / 2;
      player.y = (spawnCell.r + 1) * TS - CONFIG.PLAYER_H;
      player.vx = 0;
      player.vy = 0;
      player.state = "solid";
      player.facing = 1;
      player.grounded = false;
      player.won = false;
      player.coyoteTimer = 0;
      player.jumpBufferTimer = 0;
      player.reboundAirborneTimer = 0;
      player.reboundSurfaced = false;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      player.permeateUntilClear = false;
      player.embeddedDepth = 0;
      player.reboundStrength = 0;
      player.stuckTimer = 0;
      player.flashTimer = 0;
      particles.length = 0;
      ripples.length = 0;
      shake = 0;
      probeGrounded();
    }

    // === PHYSICS HELPERS ===
    function clamp(n, lo, hi) {
      return Math.max(lo, Math.min(hi, n));
    }

    function approach(n, target, amount) {
      if (n < target) return Math.min(target, n + amount);
      if (n > target) return Math.max(target, n - amount);
      return target;
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function spawnMatterParticle(x, y, pressure, hot) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 90,
        vy: -25 - Math.random() * (70 + pressure * 90),
        life: 0.35 + Math.random() * 0.45,
        maxLife: 0.8,
        r: 2 + Math.random() * 4 + pressure * 2.5,
        hot: !!hot
      });
    }

    function spawnRipple(x, y, pressure) {
      ripples.push({
        x: x,
        y: y,
        radius: 10,
        life: 0.55,
        maxLife: 0.55,
        pressure: pressure
      });
    }

    function updateEffects(dt) {
      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 210 * dt;
        if (p.life <= 0) particles.splice(i, 1);
      }

      for (var j = ripples.length - 1; j >= 0; j--) {
        var r = ripples[j];
        r.life -= dt;
        r.radius += (160 + r.pressure * 130) * dt;
        if (r.life <= 0) ripples.splice(j, 1);
      }

      shake = Math.max(0, shake - dt * 36);
    }

    function isSolidTile(c, r) {
      if (c < 0 || c >= COLS || r >= ROWS) return true;
      if (r < 0) return false;
      return !!tiles[r][c];
    }

    function playerRect() {
      return { x: player.x, y: player.y, w: CONFIG.PLAYER_W, h: CONFIG.PLAYER_H };
    }

    function bottomHalfRect(rect) {
      return { x: rect.x, y: rect.y + rect.h / 2, w: rect.w, h: rect.h / 2 };
    }

    function overlappingSolidTiles(rect) {
      var out = [];
      var left = Math.floor(rect.x / TS);
      var right = Math.floor((rect.x + rect.w - 0.001) / TS);
      var top = Math.floor(rect.y / TS);
      var bottom = Math.floor((rect.y + rect.h - 0.001) / TS);
      for (var r = top; r <= bottom; r++) {
        for (var c = left; c <= right; c++) {
          if (isSolidTile(c, r)) out.push({ c: c, r: r });
        }
      }
      return out;
    }

    function bottomHalfOverlapsSolid(rect) {
      return overlappingSolidTiles(bottomHalfRect(rect)).length > 0;
    }

    function laneColumns(rect) {
      return {
        left: Math.floor((rect.x + 2) / TS),
        right: Math.floor((rect.x + rect.w - 2 - 0.001) / TS)
      };
    }

    function rowHasSolidInLane(row, lane) {
      for (var c = lane.left; c <= lane.right; c++) {
        if (isSolidTile(c, row)) return true;
      }
      return false;
    }

    function firstOverlappedSolidRow(rect) {
      var lane = laneColumns(rect);
      var top = Math.floor(rect.y / TS);
      var bottom = Math.floor((rect.y + rect.h - 0.001) / TS);
      for (var r = top; r <= bottom; r++) {
        if (rowHasSolidInLane(r, lane)) return r;
      }
      return null;
    }

    function contiguousMassExtents(rect) {
      var start = firstOverlappedSolidRow(rect);
      if (start === null) return null;
      var lane = laneColumns(rect);
      var top = start;
      var bottom = start;
      while (top - 1 >= 0 && rowHasSolidInLane(top - 1, lane)) top--;
      while (bottom + 1 < ROWS && rowHasSolidInLane(bottom + 1, lane)) bottom++;
      return {
        topRow: top,
        botRow: bottom,
        topY: top * TS,
        botY: (bottom + 1) * TS,
        centerY: (top * TS + (bottom + 1) * TS) / 2
      };
    }

    function countSolidRowsAbove(rect) {
      var start = firstOverlappedSolidRow(rect);
      if (start === null) return 0;
      var lane = laneColumns(rect);
      var count = 0;
      for (var r = start; r >= 0; r--) {
        if (!rowHasSolidInLane(r, lane)) break;
        count++;
      }
      return count;
    }

    function embeddedDepthInfo(rect) {
      var ext = contiguousMassExtents(rect);
      if (!ext || !bottomHalfOverlapsSolid(rect)) {
        return { pixels: 0, strength: 0 };
      }

      var depthPixels = clamp(rect.y + rect.h - ext.topY, 0, CONFIG.PLAYER_H + TS * 2);
      var strength = clamp(depthPixels / (CONFIG.PLAYER_H + TS), 0.22, 1);
      return { pixels: depthPixels, strength: strength };
    }

    function shouldRebound(rect) {
      if (!bottomHalfOverlapsSolid(rect)) return { fire: false, stuck: false, rows: 0, strength: 0 };
      var rows = countSolidRowsAbove(rect);
      var depth = embeddedDepthInfo(rect);
      return {
        fire: true,
        stuck: rows > CONFIG.STUCK_SEARCH_RADIUS,
        rows: rows,
        depth: depth.pixels,
        strength: depth.strength
      };
    }

    function setStuck() {
      player.state = "stuck";
      player.vx = 0;
      player.vy = 0;
      player.stuckTimer = CONFIG.STUCK_DURATION;
      player.flashTimer = CONFIG.STUCK_DURATION;
      player.reboundSurfaced = false;
      player.reboundAirborneTimer = 0;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      player.permeateUntilClear = false;
      player.embeddedDepth = 0;
      player.reboundStrength = 0;
      shake = 16;
      spawnRipple(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H / 2, 0.8);
    }

    function beginRebound(result) {
      player.state = "rebounding";
      player.vy = 0;
      player.reboundSurfaced = false;
      player.reboundAirborneTimer = CONFIG.REBOUND_STATE_DURATION;
      player.permeateUntilClear = false;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      player.embeddedDepth = result && result.depth ? result.depth : 0;
      player.reboundStrength = result && result.strength ? result.strength : 0.35;
      shake = 5 + player.reboundStrength * 12;
      spawnRipple(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H / 2, player.reboundStrength);
      for (var i = 0; i < 22; i++) {
        spawnMatterParticle(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H / 2, player.reboundStrength, true);
      }
    }

    function consumeReboundExit() {
      if (player.queuedPermeate) {
        player.state = "permeating";
        player.permeateUntilClear = false;
        player.queuedPermeate = false;
        player.queuedPermeateSource = null;
        player.reboundSurfaced = false;
        return;
      }
      player.state = "solid";
      player.reboundSurfaced = false;
      player.reboundAirborneTimer = 0;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      player.embeddedDepth = 0;
      player.reboundStrength = 0;
    }

    function moveAndCollide(dx, dy) {
      player.grounded = false;
      moveAxis("x", dx);
      moveAxis("y", dy);
    }

    function moveAxis(axis, amount) {
      var sign = Math.sign(amount);
      var remaining = Math.abs(amount);
      while (remaining > 0) {
        var stepAmount = Math.min(1, remaining) * sign;
        if (axis === "x") {
          player.x += stepAmount;
          var xHits = overlappingSolidTiles(playerRect());
          if (xHits.length > 0) {
            if (sign > 0) {
              var minCol = xHits.reduce(function (m, t) { return Math.min(m, t.c); }, Infinity);
              player.x = minCol * TS - CONFIG.PLAYER_W;
            } else {
              var maxCol = xHits.reduce(function (m, t) { return Math.max(m, t.c); }, -Infinity);
              player.x = (maxCol + 1) * TS;
            }
            player.vx = 0;
            break;
          }
        } else {
          player.y += stepAmount;
          var yHits = overlappingSolidTiles(playerRect());
          if (yHits.length > 0) {
            if (sign > 0) {
              var minRow = yHits.reduce(function (m, t) { return Math.min(m, t.r); }, Infinity);
              player.y = minRow * TS - CONFIG.PLAYER_H;
            } else {
              var maxRow = yHits.reduce(function (m, t) { return Math.max(m, t.r); }, -Infinity);
              player.y = (maxRow + 1) * TS;
            }
            if (sign > 0) player.grounded = true;
            player.vy = 0;
            break;
          }
        }
        remaining -= Math.abs(stepAmount);
      }
      player.x = clamp(player.x, 0, levelW - CONFIG.PLAYER_W);
      player.y = Math.min(player.y, levelH - CONFIG.PLAYER_H);
    }

    function probeGrounded() {
      if (overlappingSolidTiles(playerRect()).length > 0) {
        player.grounded = false;
        return false;
      }
      var rect = playerRect();
      var probe = { x: rect.x, y: rect.y + 1, w: rect.w, h: rect.h };
      player.grounded = overlappingSolidTiles(probe).length > 0;
      return player.grounded;
    }

    function placePlayerAtCell(c, r) {
      player.x = c * TS + (TS - CONFIG.PLAYER_W) / 2;
      player.y = (r + 1) * TS - CONFIG.PLAYER_H;
      player.vx = 0;
      player.vy = 0;
      player.state = "solid";
      player.won = false;
      player.permeateUntilClear = false;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      probeGrounded();
    }

    function triggerReboundOrStuck(result) {
      if (result.stuck) {
        setStuck();
      } else {
        beginRebound(result);
      }
    }

    // === STEP (fixed dt) ===
    function step(dt) {
      var skipVerticalForce = false;

      keyEdge.Space = !!keyEdge.Space;
      keyEdge.KeyW = !!keyEdge.KeyW;
      keyEdge.ArrowUp = !!keyEdge.ArrowUp;
      keyReleased.Space = !!keyReleased.Space;
      keyReleased.KeyW = !!keyReleased.KeyW;
      keyReleased.ArrowUp = !!keyReleased.ArrowUp;
      if (jumpPressed()) player.jumpBufferTimer = CONFIG.JUMP_BUFFER_FRAMES;

      player.coyoteTimer = Math.max(0, player.coyoteTimer - 1);
      player.jumpBufferTimer = Math.max(0, player.jumpBufferTimer - 1);
      player.flashTimer = Math.max(0, player.flashTimer - dt);
      updateEffects(dt);

      if (keyEdge.KeyR) spawnPlayer();

      if (player.state === "won") {
        clearEdges();
        return;
      }

      if (player.state === "stuck") {
        player.stuckTimer -= dt;
        if (player.stuckTimer <= 0) spawnPlayer();
        clearEdges();
        return;
      }

      var autoChainActive = !!(permeateHeld() && assistHeld());
      if (!autoChainActive && player.queuedPermeateSource === "auto") {
        player.queuedPermeate = false;
        player.queuedPermeateSource = null;
      }

      if (permeatePressed() && player.permeateUntilClear) {
        player.permeateUntilClear = false;
      }

      if (player.state === "solid" && permeatePressed()) {
        player.state = "permeating";
        player.permeateUntilClear = false;
      }

      if (player.state === "rebounding") {
        if (permeatePressed()) {
          player.queuedPermeate = true;
          player.queuedPermeateSource = "manual";
        }
        if (autoChainActive) {
          player.queuedPermeate = true;
          player.queuedPermeateSource = "auto";
        }
        if (player.queuedPermeateSource === "manual" && permeateReleased()) {
          player.queuedPermeate = false;
          player.queuedPermeateSource = null;
        }
        if (player.queuedPermeateSource === "auto" && (!permeateHeld() || !assistHeld())) {
          player.queuedPermeate = false;
          player.queuedPermeateSource = null;
        }
      }

      if (player.state === "permeating") {
        var rect = playerRect();
        var fullOverlap = overlappingSolidTiles(rect).length > 0;
        var rebound = shouldRebound(rect);
        player.embeddedDepth = rebound.depth || (fullOverlap ? embeddedDepthInfo(rect).pixels : 0);
        if (autoChainActive && rebound.fire) {
          triggerReboundOrStuck(rebound);
          if (player.state === "rebounding") {
            player.queuedPermeate = true;
            player.queuedPermeateSource = "auto";
          }
          skipVerticalForce = true;
        } else if (permeateReleased() && !player.permeateUntilClear) {
          if (rebound.fire) {
            triggerReboundOrStuck(rebound);
            skipVerticalForce = true;
          } else if (fullOverlap) {
            player.permeateUntilClear = true;
          } else {
            player.state = "solid";
          }
        }
      }

      if (player.state === "permeating" && player.permeateUntilClear && overlappingSolidTiles(playerRect()).length === 0) {
        player.permeateUntilClear = false;
        player.state = "solid";
      }

      var moveInput = (keys.ArrowRight || keys.KeyD ? 1 : 0) - (keys.ArrowLeft || keys.KeyA ? 1 : 0);
      if (moveInput !== 0) player.facing = moveInput;
      var accel = CONFIG.MOVE_ACCEL * (player.state === "rebounding" ? CONFIG.REBOUND_AIR_CONTROL : 1);
      if (moveInput !== 0) {
        player.vx += moveInput * accel;
        if (player.state !== "rebounding") player.vx = clamp(player.vx, -CONFIG.MAX_RUN_SPEED, CONFIG.MAX_RUN_SPEED);
      } else {
        player.vx = approach(player.vx, 0, CONFIG.MOVE_DECEL);
      }

      var canJump = (player.state === "solid" || (player.state === "rebounding" && player.reboundSurfaced)) &&
        (player.grounded || player.coyoteTimer > 0);
      if (player.jumpBufferTimer > 0 && canJump) {
        player.vy = CONFIG.JUMP_VELOCITY;
        player.jumpBufferTimer = 0;
        player.coyoteTimer = 0;
        player.grounded = false;
        skipVerticalForce = true;
        spawnRipple(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H, 0.25);
      }
      if (jumpReleased() && player.vy < CONFIG.JUMP_CUT_VELOCITY) {
        player.vy = CONFIG.JUMP_CUT_VELOCITY;
        skipVerticalForce = true;
      }

      var embedded = overlappingSolidTiles(playerRect()).length > 0;
      if (player.state === "permeating" && embedded && Math.random() < 0.45) {
        var chargeForParticle = clamp((player.embeddedDepth || 0) / (CONFIG.PLAYER_H + TS), 0, 1);
        spawnMatterParticle(
          player.x + CONFIG.PLAYER_W / 2 + (Math.random() - 0.5) * CONFIG.PLAYER_W,
          player.y + CONFIG.PLAYER_H / 2,
          chargeForParticle,
          false
        );
      }
      if (!skipVerticalForce) {
        if (player.state === "permeating") {
          if (embedded && !player.permeateUntilClear) {
            // Permeation is viscous, not free-fall: drag bleeds off speed and a
            // gentle center-pull nudges the player toward the contiguous mass's
            // vertical midpoint. The latch deliberately skips this section so a
            // top-half-only release can drift fully clear instead of being re-caught.
            var ext = contiguousMassExtents(playerRect());
            player.vy *= (1 - CONFIG.PERMEATE_DRAG);
            if (ext) {
              var center = player.y + CONFIG.PLAYER_H / 2;
              if (Math.abs(ext.centerY - center) > 2) {
                player.vy += Math.sign(ext.centerY - center) * CONFIG.PERMEATE_PULL_ACCEL;
              }
            }
            player.vy = clamp(player.vy, -CONFIG.MAX_FALL_SPEED, CONFIG.MAX_FALL_SPEED);
          } else {
            player.embeddedDepth = 0;
            player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
          }
        } else if (player.state === "rebounding") {
          if (embedded && !player.reboundSurfaced) {
            // Buoyancy is accumulated while still inside the mass. Collision is
            // intentionally disabled in the buoyant phase below, otherwise every
            // interior tile row would cancel the ascent before the player surfaces.
            var strength = clamp(player.reboundStrength || 0.35, 0.22, 1);
            var accelBoost = CONFIG.BUOYANCY_ACCEL + CONFIG.BUOYANCY_DEPTH_ACCEL * strength;
            var maxRise = CONFIG.BUOYANCY_MIN_SPEED +
              (CONFIG.BUOYANCY_MAX_SPEED - CONFIG.BUOYANCY_MIN_SPEED) * strength;
            player.vy = Math.max(-maxRise, player.vy - accelBoost);
          } else {
            if (!player.reboundSurfaced) {
              player.reboundSurfaced = true;
              player.reboundAirborneTimer = CONFIG.REBOUND_STATE_DURATION;
            }
            player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
            player.reboundAirborneTimer -= dt;
          }
        } else {
          player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
        }
      }

      embedded = overlappingSolidTiles(playerRect()).length > 0;
      if (player.state === "permeating" || (player.state === "rebounding" && embedded && !player.reboundSurfaced)) {
        player.x += player.vx;
        player.y += player.vy;
        player.x = clamp(player.x, 0, levelW - CONFIG.PLAYER_W);
        player.y = clamp(player.y, -levelH, levelH - CONFIG.PLAYER_H);
        player.grounded = false;
      } else {
        moveAndCollide(player.vx, player.vy);
      }

      probeGrounded();
      if (player.grounded) player.coyoteTimer = CONFIG.COYOTE_FRAMES;

      if (player.state === "rebounding") {
        var nowEmbedded = overlappingSolidTiles(playerRect()).length > 0;
        if (!nowEmbedded && !player.reboundSurfaced) {
          player.reboundSurfaced = true;
          player.reboundAirborneTimer = CONFIG.REBOUND_STATE_DURATION;
        }
        if (player.reboundSurfaced) {
          consumeReboundExit();
        }
      }

      if (rectsOverlap(playerRect(), goalRect)) {
        player.state = "won";
        player.won = true;
        spawnRipple(goalRect.x + goalRect.w / 2, goalRect.y + goalRect.h / 2, 1);
      }

      clearEdges();
    }

    function clearEdges() {
      for (var k in keyEdge) keyEdge[k] = false;
      for (var r in keyReleased) keyReleased[r] = false;
    }

    // === RENDER ===
    var cameraY = 0;

    function draw() {
      cameraY = clamp(player.y + CONFIG.PLAYER_H / 2 - CONFIG.VIEW_H / 2, 0, levelH - CONFIG.VIEW_H);
      ctx.clearRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.fillStyle = "#10141a";
      ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);

      ctx.save();
      var sx = shake ? (Math.random() - 0.5) * shake : 0;
      var sy = shake ? (Math.random() - 0.5) * shake : 0;
      ctx.translate(sx, sy - Math.round(cameraY));
      drawBackground();
      drawTiles();
      drawGoal();
      drawParticles();
      drawPlayer();
      ctx.restore();

      drawHud();
      drawOverlay();
      if (player.won) drawWin();
    }

    function drawBackground() {
      var sky = ctx.createLinearGradient(0, 0, 0, levelH);
      sky.addColorStop(0, "#101720");
      sky.addColorStop(0.45, "#182319");
      sky.addColorStop(1, "#263126");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, levelW, levelH);

      ctx.save();
      ctx.globalAlpha = 0.42;
      for (var i = 0; i < 11; i++) {
        var mx = i * 112 - 60;
        var my = 145 + Math.sin(i * 1.8) * 44;
        ctx.fillStyle = i % 2 ? "#253c32" : "#314139";
        ctx.beginPath();
        ctx.moveTo(mx - 80, levelH);
        ctx.lineTo(mx + 48, my);
        ctx.lineTo(mx + 190, levelH);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      ctx.strokeStyle = "rgba(244, 240, 223, 0.075)";
      ctx.lineWidth = 1;
      for (var y = 70; y <= levelH; y += 56) {
        ctx.beginPath();
        for (var x = -40; x <= levelW + 40; x += 28) {
          var wobble = Math.sin(x * 0.018 + y * 0.05) * 5;
          if (x === -40) ctx.moveTo(x, y + wobble);
          else ctx.lineTo(x, y + wobble);
        }
        ctx.stroke();
      }
    }

    function drawTiles() {
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (!tiles[r][c]) continue;
          var x = c * TS;
          var y = r * TS;
          var dense = r < ROWS - 2 || (r % 6 === 5);
          var grad = ctx.createLinearGradient(x, y, x, y + TS);
          if (dense) {
            grad.addColorStop(0, "#6a523c");
            grad.addColorStop(0.38, "#8e6348");
            grad.addColorStop(1, "#2f3c35");
          } else {
            grad.addColorStop(0, "#5e6f50");
            grad.addColorStop(1, "#26372c");
          }
          ctx.fillStyle = grad;
          ctx.fillRect(x, y, TS, TS);
          ctx.fillStyle = "rgba(244, 240, 223, 0.18)";
          ctx.fillRect(x, y, TS, 3);
          ctx.save();
          ctx.beginPath();
          ctx.rect(x, y, TS, TS);
          ctx.clip();
          ctx.globalAlpha = dense ? 0.34 : 0.2;
          ctx.strokeStyle = dense ? "#f0c85f" : "#b8c7b8";
          ctx.lineWidth = 1;
          for (var stripe = -TS; stripe < TS * 2; stripe += 17) {
            ctx.beginPath();
            ctx.moveTo(x + stripe, y + TS);
            ctx.lineTo(x + stripe + TS, y);
            ctx.stroke();
          }
          ctx.restore();
        }
      }
    }

    function roundRect(x, y, w, h, r) {
      var rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
    }

    function drawGoal() {
      var active = player.won ? 1 : 0.45 + Math.sin(performance.now() * 0.006) * 0.08;
      ctx.save();
      ctx.globalAlpha = 0.94;
      ctx.strokeStyle = "rgba(104, 211, 145, " + active.toFixed(3) + ")";
      ctx.lineWidth = 5;
      roundRect(goalRect.x, goalRect.y - 18, goalRect.w, goalRect.h + 36, 8);
      ctx.stroke();
      ctx.fillStyle = "rgba(104, 211, 145, " + (player.won ? 0.22 : 0.08) + ")";
      ctx.fill();
      ctx.fillStyle = "#f4f0df";
      ctx.fillRect(goalRect.x + goalRect.w / 2 - 5, goalRect.y - 5, 10, goalRect.h + 10);
      ctx.restore();
    }

    function drawPlayer() {
      var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 110);
      var alpha = player.state === "permeating" ? 0.62 : 1;
      var cx = player.x + CONFIG.PLAYER_W / 2;
      var cy = player.y + CONFIG.PLAYER_H / 2;
      var charge = clamp((player.embeddedDepth || 0) / (CONFIG.PLAYER_H + TS), 0, 1);

      if (player.state === "permeating" || player.state === "rebounding") {
        ctx.save();
        ctx.globalAlpha = player.state === "rebounding" ? 0.76 : 0.48 + charge * 0.28;
        ctx.strokeStyle = player.state === "rebounding" ? "#e85f5c" : "#77d1c8";
        ctx.lineWidth = 2 + charge * 3;
        ctx.beginPath();
        ctx.ellipse(cx, cy, CONFIG.PLAYER_W * (0.9 + charge * 0.7), CONFIG.PLAYER_H * 0.78, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      var glow = ctx.createRadialGradient(cx, cy, 2, cx, cy, 34 + charge * 42);
      glow.addColorStop(0, player.state === "rebounding" ? "rgba(232, 95, 92, 0.52)" : "rgba(240, 200, 95, 0.46)");
      glow.addColorStop(1, "rgba(240, 200, 95, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, 34 + charge * 42, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = player.won ? "#f4f0df" :
        player.state === "stuck" ? "#e85f5c" :
        player.state === "rebounding" ? "#f0c85f" :
        player.state === "permeating" ? "#77d1c8" : "#f4f0df";
      roundRect(player.x, player.y, CONFIG.PLAYER_W, CONFIG.PLAYER_H, 7);
      ctx.fill();
      ctx.restore();

      ctx.lineWidth = 3;
      if (player.state === "permeating") {
        ctx.strokeStyle = "rgba(119, 209, 200, " + (0.45 + pulse * 0.45).toFixed(3) + ")";
      } else if (player.state === "rebounding") {
        ctx.strokeStyle = "#e85f5c";
      } else if (player.state === "stuck" || player.flashTimer > 0) {
        ctx.strokeStyle = "#e85f5c";
      } else if (player.won) {
        ctx.strokeStyle = "#68d391";
      } else {
        ctx.strokeStyle = "#111820";
      }
      roundRect(player.x - 1, player.y - 1, CONFIG.PLAYER_W + 2, CONFIG.PLAYER_H + 2, 8);
      ctx.stroke();

      ctx.fillStyle = "#0f172a";
      var eyeX = player.facing > 0 ? player.x + CONFIG.PLAYER_W - 8 : player.x + 5;
      ctx.fillRect(eyeX, player.y + 10, 4, 4);
      ctx.fillStyle = player.state === "permeating" ? "#77d1c8" : "#d96042";
      ctx.fillRect(player.x + 5, player.y + CONFIG.PLAYER_H - 8, CONFIG.PLAYER_W - 10, 4);
    }

    function drawParticles() {
      for (var i = 0; i < ripples.length; i++) {
        var ripple = ripples[i];
        var alpha = clamp(ripple.life / ripple.maxLife, 0, 1);
        ctx.strokeStyle = "rgba(240, 200, 95, " + (alpha * 0.68).toFixed(3) + ")";
        ctx.lineWidth = 2 + ripple.pressure * 3;
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
        ctx.stroke();
      }

      for (var j = 0; j < particles.length; j++) {
        var p = particles[j];
        var lifeAlpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.fillStyle = p.hot ?
          "rgba(232, 95, 92, " + lifeAlpha.toFixed(3) + ")" :
          "rgba(119, 209, 200, " + lifeAlpha.toFixed(3) + ")";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * lifeAlpha, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawOverlay() {
      var depth = clamp((player.embeddedDepth || 0) / (CONFIG.PLAYER_H + TS), 0, 1);
      if (depth <= 0 && player.flashTimer <= 0) return;
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalAlpha = depth * 0.16 + (player.flashTimer > 0 ? 0.16 : 0);
      ctx.fillStyle = player.state === "stuck" ? "#e85f5c" : "#77d1c8";
      ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.restore();
    }

    function drawHud() {
      var stateText = player.won ? "Won" : player.state.charAt(0).toUpperCase() + player.state.slice(1);
      var stateColor = {
        solid: "#f0c85f",
        permeating: "#77d1c8",
        rebounding: "#e85f5c",
        stuck: "#e85f5c",
        won: "#68d391"
      }[player.won ? "won" : player.state];
      var charge = clamp((player.embeddedDepth || 0) / (CONFIG.PLAYER_H + TS), 0, 1);
      var message = "solid state";
      if (player.state === "permeating") {
        message = player.permeateUntilClear ? "clearing material" : "release to rebound";
      } else if (player.state === "rebounding") {
        message = "up, up and away!";
      } else if (player.state === "stuck") {
        message = "no upward exit";
      } else if (player.won) {
        message = "Level completed!";
      }

      if (stateLabel) {
        stateLabel.textContent = stateText;
        if (stateLabel.style) stateLabel.style.background = stateColor;
      }
      if (messageLabel) messageLabel.textContent = message;
      if (pressureFill && pressureFill.style) pressureFill.style.width = Math.round(charge * 100) + "%";
    }

    function drawWin() {
      ctx.fillStyle = "rgba(5, 6, 9, 0.68)";
      ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.fillStyle = "#facc15";
      ctx.font = "800 44px ui-sans-serif, system-ui";
      ctx.textAlign = "center";
      ctx.fillText("Level Complete", CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 - 12);
      ctx.fillStyle = "#f8fafc";
      ctx.font = "18px ui-sans-serif, system-ui";
      ctx.fillText("Press R to play again", CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 30);
      ctx.textAlign = "left";
    }

    // === LOOP ===
    var lastTime = performance.now();
    var accumulator = 0;

    function loop(now) {
      accumulator += Math.min(0.25, (now - lastTime) / 1000);
      lastTime = now;
      while (accumulator >= CONFIG.DT) {
        step(CONFIG.DT);
        accumulator -= CONFIG.DT;
      }
      renderOnly();
      requestAnimationFrame(loop);
    }

    function renderOnly() {
      cameraY = clamp(player.y + CONFIG.PLAYER_H / 2 - CONFIG.VIEW_H / 2, 0, levelH - CONFIG.VIEW_H);
      ctx.clearRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.fillStyle = "#10141a";
      ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.save();
      var sx = shake ? (Math.random() - 0.5) * shake : 0;
      var sy = shake ? (Math.random() - 0.5) * shake : 0;
      ctx.translate(sx, sy - Math.round(cameraY));
      drawBackground();
      drawTiles();
      drawGoal();
      drawParticles();
      drawPlayer();
      ctx.restore();
      drawHud();
      drawOverlay();
      if (player.won) drawWin();
    }

    spawnPlayer();
    requestAnimationFrame(loop);

    window.gameInternals = {
      CONFIG: CONFIG,
      LEVEL: LEVEL,
      tiles: tiles,
      player: player,
      keys: keys,
      keyEdge: keyEdge,
      keyReleased: keyReleased,
      spawnCell: spawnCell,
      goalRect: goalRect,
      parseLevel: parseLevel,
      spawnPlayer: spawnPlayer,
      step: step,
      clearEdges: clearEdges,
      isSolidTile: isSolidTile,
      playerRect: playerRect,
      bottomHalfRect: bottomHalfRect,
      overlappingSolidTiles: overlappingSolidTiles,
      bottomHalfOverlapsSolid: bottomHalfOverlapsSolid,
      contiguousMassExtents: contiguousMassExtents,
      countSolidRowsAbove: countSolidRowsAbove,
      shouldRebound: shouldRebound,
      moveAndCollide: moveAndCollide,
      probeGrounded: probeGrounded,
      placePlayerAtCell: placePlayerAtCell,
      beginRebound: beginRebound
    };
  }());
  </script>
</body>
</html>
