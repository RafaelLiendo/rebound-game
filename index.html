<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Permeation Buoyancy Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6f3ff;
      --muted: #a9c7ff;
      --panel: rgba(8, 10, 28, 0.76);
      --line: rgba(155, 221, 255, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: hidden;
      background:
        radial-gradient(circle at 30% 18%, rgba(62, 216, 255, 0.22), transparent 30%),
        radial-gradient(circle at 75% 68%, rgba(212, 64, 255, 0.22), transparent 34%),
        linear-gradient(145deg, #060816 0%, #120b2f 48%, #040716 100%);
      color: var(--ink);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    .shell {
      position: relative;
      width: min(100vw - 36px, 1180px);
      aspect-ratio: 16 / 9;
      min-height: 280px;
      max-height: calc(100vh - 36px);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #060814;
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.56),
        0 0 42px rgba(93, 208, 255, 0.14),
        inset 0 0 40px rgba(180, 72, 255, 0.08);
    }

    .hud {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 12px;
      display: grid;
      grid-template-columns: max-content 1fr max-content;
      grid-template-areas:
        "readout . controls";
      gap: 20px;
      align-items: start;
      pointer-events: none;
    }

    .readout,
    .controls {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(12, 14, 38, 0.82), rgba(8, 10, 28, 0.66));
      backdrop-filter: blur(10px);
      box-shadow:
        0 8px 22px rgba(0, 0, 0, 0.28),
        0 0 18px rgba(83, 209, 255, 0.12);
    }

    .readout {
      grid-area: readout;
      display: grid;
      width: 250px;
      gap: 7px;
      padding: 7px 9px 8px;
    }

    .status {
      display: flex;
      gap: 9px;
      align-items: center;
      min-width: 0;
    }

    #stateLabel {
      flex: 0 0 auto;
      min-width: 92px;
      color: #050714;
      border-radius: 6px;
      background: #8be9ff;
      padding: 3px 7px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-align: center;
      text-transform: uppercase;
    }

    #messageLabel {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meter {
      position: relative;
      width: 100%;
      height: 8px;
      overflow: hidden;
      border: 1px solid rgba(166, 224, 255, 0.24);
      border-radius: 999px;
      background: rgba(6, 8, 22, 0.86);
    }

    #pressureFill {
      position: absolute;
      z-index: 1;
      inset: 0 auto 0 0;
      display: block;
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4be7ff, #b56cff 58%, #ff5cf4);
      box-shadow: 0 0 14px rgba(181, 108, 255, 0.82);
      transition: width 90ms linear;
    }

    .meterSegments {
      position: absolute;
      z-index: 2;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      pointer-events: none;
    }

    .meterSegment + .meterSegment {
      border-left: 2px solid rgba(255, 255, 255, 0.09);
    }

    .controls {
      grid-area: controls;
      display: grid;
      grid-template-rows: repeat(2, minmax(0, 1fr));
      grid-auto-flow: column;
      gap: 4px 16px;
      width: max-content;
      max-width: min(48vw, 420px);
      padding: 7px 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.1;
      pointer-events: none;
    }

    .control {
      display: flex;
      gap: 7px;
      align-items: center;
      min-width: 0;
      min-height: 18px;
    }

    .control:nth-child(-n + 2) {
      grid-column: span 1;
    }

    .control:nth-child(n + 3) {
      grid-column: span 2;
    }

    .key {
      flex: 0 0 auto;
      min-width: 28px;
      border: 1px solid rgba(155, 221, 255, 0.42);
      border-radius: 4px;
      background: rgba(222, 240, 255, 0.92);
      color: #050714;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 900;
      line-height: 15px;
      text-align: center;
      white-space: nowrap;
    }

    .control-copy {
      display: flex;
      gap: 4px;
      align-items: baseline;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }

    .control-name,
    .control-hint {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .control-name {
      color: var(--ink);
      font-weight: 850;
    }

    .control-hint {
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
    }

    @media (max-width: 980px) {
      .hud {
        grid-template-columns: max-content 1fr;
        grid-template-areas:
          "readout ."
          "controls controls";
      }
      .controls {
        display: none;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .shell {
        width: calc(100vw - 20px);
        max-height: calc(100vh - 20px);
      }

      .hud {
        left: 10px;
        right: 10px;
        top: 10px;
        grid-template-columns: max-content 1fr;
        grid-template-areas:
          "readout ."
          "controls controls";
        gap: 8px;
      }

      .meter {
        width: min(100%, 220px);
      }

      #messageLabel,
      .controls {
        font-size: 12px;
      }

      .controls {
        display: none;
        grid-template-rows: none;
        grid-template-columns: 1fr;
        grid-auto-flow: row;
      }

      .control,
      .control:nth-child(-n + 2),
      .control:nth-child(n + 3) {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <canvas id="game" width="960" height="540" aria-label="Permeation buoyancy game demo"></canvas>
    <section class="hud" aria-label="Game status">
      <div class="readout">
        <div id="pressureMeter" class="meter" role="progressbar" aria-label="rebound depth" aria-valuemin="0" aria-valuemax="5" aria-valuenow="0" aria-valuetext="0.0/5">
          <span id="pressureFill"></span>
          <span class="meterSegments" aria-hidden="true">
            <span class="meterSegment"></span>
            <span class="meterSegment"></span>
            <span class="meterSegment"></span>
            <span class="meterSegment"></span>
            <span class="meterSegment"></span>
          </span>
        </div>
        <div class="status">
          <span id="stateLabel">solid</span>
          <span id="messageLabel">find the pressure in the ground</span>
        </div>
      </div>
      <div class="controls">
        <span class="control">
          <span class="key">&larr;</span>
          <span class="key">&rarr;</span>
          <span class="control-copy">
            <span class="control-name">Move</span>
          </span>
        </span>
        <span class="control">
          <span class="key">&nbsp;&nbsp;&nbsp;&nbsp;Space&nbsp;&nbsp;&nbsp;&nbsp;</span>
          <span class="control-copy">
            <span class="control-name">Jump</span>
          </span>
        </span>
        <span class="control">
          <span class="key">Shift</span>
          <span class="control-copy">
            <span class="control-name">Permeate</span>
            <span class="control-hint">hold to sink, release to rebound</span>
          </span>
        </span>
        <span class="control">
          <span class="key">Ctrl+Shift</span>
          <span class="control-copy">
            <span class="control-name">Chain</span>
            <span class="control-hint">Permeate/Rebound</span>
          </span>
        </span>
      </div>
    </section>
  </main>

    var stateLabel = document.getElementById("stateLabel");
    var messageLabel = document.getElementById("messageLabel");
    var pressureMeter = document.getElementById("pressureMeter");
    var pressureFill = document.getElementById("pressureFill");
    var particles = [];
    var ripples = [];
    var shake = 0;

    // === LEVEL DATA ===
    function defined(value, fallback) {
      return value === undefined ? fallback : value;
    }

    function isEntityChar(ch) {
      return /^[A-Za-z]$/.test(ch);
    }

    function isCheckpointChar(ch) {
      return /^[0-9]$/.test(ch);
    }

    function cellKey(c, r) {
      return c + "," + r;
    }

    function rectanglesFromCells(levelName, marker, cells) {
      var remaining = {};
      var rects = [];
      cells.forEach(function (cell) {
        remaining[cellKey(cell.c, cell.r)] = cell;
      });

      while (cells.length) {
        var seed = null;
        while (cells.length && !seed) {
          var next = cells.pop();
          if (remaining[cellKey(next.c, next.r)]) seed = next;
        }
        if (!seed) break;

        var stack = [seed];
        var cluster = [];
        var minC = seed.c;
        var maxC = seed.c;
        var minR = seed.r;
        var maxR = seed.r;
        delete remaining[cellKey(seed.c, seed.r)];

        while (stack.length) {
          var cell = stack.pop();
          cluster.push(cell);
          minC = Math.min(minC, cell.c);
          maxC = Math.max(maxC, cell.c);
          minR = Math.min(minR, cell.r);
          maxR = Math.max(maxR, cell.r);

          [
            { c: cell.c + 1, r: cell.r },
            { c: cell.c - 1, r: cell.r },
            { c: cell.c, r: cell.r + 1 },
            { c: cell.c, r: cell.r - 1 }
          ].forEach(function (neighbor) {
            var key = cellKey(neighbor.c, neighbor.r);
            if (!remaining[key]) return;
            stack.push(remaining[key]);
            delete remaining[key];
          });
        }

        if (cluster.length !== (maxC - minC + 1) * (maxR - minR + 1)) {
          throw new Error(levelName + " marker " + marker + " must form rectangles.");
        }
        rects.push({ c: minC, r: minR, w: maxC - minC + 1, h: maxR - minR + 1 });
      }

      return rects.sort(function (a, b) {
        return a.r === b.r ? a.c - b.c : a.r - b.r;
      });
    }

    function normalizeEntity(def, rect, name) {
      var motion = def.motion || {};
      var timing = def.timing || {};
      var amplitude = motion.amplitude || {};
      var out = {
        type: def.kind,
        name: name,
        c: rect.c,
        r: rect.r,
        w: rect.w,
        h: rect.h,
        role: def.role || "platform"
      };
      if (def.kind === "mover") {
        out.path = motion.kind || "horizontal";
        out.ampX = defined(amplitude.x, 0);
        out.ampY = defined(amplitude.y, 0);
        out.speed = defined(motion.speed, 1);
        out.phase = defined(motion.phase, 0);
      } else if (def.kind === "asteroid") {
        out.speed = defined(timing.speed, 260);
        out.period = defined(timing.period, 4);
        out.phase = defined(timing.phase, 0);
        out.warning = defined(timing.warning, 0.75);
      }
      return out;
    }

    function validateLevelAuthoring(def) {
      if (!def || !def.name) throw new Error("Level must have a name.");
      if (!def.map || !def.map.length) throw new Error(def.name + " must have a map.");
      var width = def.map[0].length;
      for (var r = 1; r < def.map.length; r++) {
        if (def.map[r].length !== width) {
          throw new Error(def.name + " row " + (r + 1) + " has " + def.map[r].length + " columns; expected " + width + ".");
        }
      }
    }

    function normalizeLevelAuthoring(def) {
      validateLevelAuthoring(def);
      if (def.checkpoints !== undefined) throw new Error(def.name + " checkpoints must be authored as digits in the map.");

      var entityDefs = {};
      var entityCells = {};
      var checkpoints = [];
      var checkpointsByOrder = {};
      var spawn = null;
      var goal = null;
      (def.entities || []).forEach(function (entity, index) {
        var label = "entity " + (entity.name || index + 1);
        if (["mover", "asteroid"].indexOf(entity.kind) < 0) {
          throw new Error(def.name + " " + label + " has unknown kind " + entity.kind + ".");
        }
        if (!entity.char || entity.char.length !== 1 || !isEntityChar(entity.char)) {
          throw new Error(def.name + " " + label + " must use a single ASCII letter char.");
        }
        if (entityDefs[entity.char]) {
          throw new Error(def.name + " has multiple entities using char " + entity.char + ".");
        }
        if (entity.at !== undefined || entity.size !== undefined) {
          throw new Error(def.name + " " + label + " must use char markers instead of at/size.");
        }
        entityDefs[entity.char] = entity;
        entityCells[entity.char] = [];
      });

      for (var r = 0; r < def.map.length; r++) {
        for (var c = 0; c < def.map[r].length; c++) {
          var ch = def.map[r][c];
          if (isCheckpointChar(ch)) {
            var order = Number(ch);
            if (checkpointsByOrder[order]) throw new Error(def.name + " has duplicate checkpoint " + ch + ".");
            checkpointsByOrder[order] = { order: order, name: order === 0 ? "spawn" : "checkpoint " + ch, c: c, r: r };
            if (order === 0) spawn = checkpointsByOrder[order];
          } else if (ch === "@") {
            if (goal) throw new Error(def.name + " must have exactly one goal.");
            goal = { c: c, r: r };
          } else if (isEntityChar(ch)) {
            if (!entityCells[ch]) throw new Error(def.name + " map marker " + ch + " has no matching entity definition.");
            entityCells[ch].push({ c: c, r: r });
          }
        }
      }

      var entities = [];
      for (var ch in entityDefs) {
        if (!entityCells[ch].length) {
          throw new Error(def.name + " entity char " + ch + " does not appear in the map.");
        }
        var rects = rectanglesFromCells(def.name, ch, entityCells[ch]);
        for (var i = 0; i < rects.length; i++) {
          var entityDef = entityDefs[ch];
          var name = entityDef.name || entityDef.kind;
          if (rects.length > 1) name += " " + (i + 1);
          entities.push(normalizeEntity(entityDef, rects[i], name));
        }
      }

      for (var checkpointOrder = 0; checkpointOrder <= 9; checkpointOrder++) {
        if (checkpointsByOrder[checkpointOrder]) {
          checkpoints.push(checkpointsByOrder[checkpointOrder]);
        }
      }

      if (!spawn) throw new Error(def.name + " must have exactly one spawn checkpoint 0.");
      if (!goal) throw new Error(def.name + " must have exactly one goal.");

      return { entities: entities, checkpoints: checkpoints, spawn: spawn, goal: goal };
    }

        map: def.map.slice(),
        entities: markers.entities,
        checkpoints: markers.checkpoints,
        spawn: markers.spawn,
        goal: markers.goal
      };

      return overlappingSolidTiles(rect).map(function (t) {
        return { type: "tile", c: t.c, r: t.r, x: t.c * TS, y: t.r * TS, w: TS, h: TS };
      });
    }

    function entityRect(e) {
      return { type: e.type, entity: e, x: e.x, y: e.y, w: e.w, h: e.h };
    }

    function overlappingSolidEntities(rect) {
      var out = [];
      for (var i = 0; i < entities.length; i++) {
        var e = entities[i];
        if (e.solid && rectsOverlap(rect, entityRect(e))) out.push(e);
      }
      return out;
    }

    function overlappingMatter(rect) {
      var out = solidTileRects(rect);
      for (var i = 0; i < entities.length; i++) {
        var e = entities[i];
        var er = entityRect(e);
        if (e.solid && rectsOverlap(rect, er)) out.push(er);
      }
      return out;
    }

    function overlappingSolidMatter(rect) {
      return overlappingMatter(rect);
    }

    function bottomHalfOverlapsSolid(rect) {
      return overlappingMatter(bottomHalfRect(rect)).length > 0;
    }

    function laneColumns(rect) {
      return {
        left: Math.floor((rect.x + 2) / TS),
        right: Math.floor((rect.x + rect.w - 2 - 0.001) / TS)
      };
    }

    function rowHasSolidInLane(row, lane) {
      for (var c = lane.left; c <= lane.right; c++) {
        if (isSolidTile(c, row)) return true;
      }
      return false;
    }

    function firstOverlappedSolidRow(rect) {
      var lane = laneColumns(rect);
      var top = Math.floor(rect.y / TS);
      var bottom = Math.floor((rect.y + rect.h - 0.001) / TS);
      for (var r = top; r <= bottom; r++) {
        if (rowHasSolidInLane(r, lane)) return r;
      }
      return null;
    }

    function contiguousMassExtents(rect) {
      var start = firstOverlappedSolidRow(rect);
      if (start === null) return null;
      var lane = laneColumns(rect);
      var top = start;
      var bottom = start;
      while (top - 1 >= 0 && rowHasSolidInLane(top - 1, lane)) top--;
      while (bottom + 1 < ROWS && rowHasSolidInLane(bottom + 1, lane)) bottom++;
      return {
        topRow: top,
        botRow: bottom,
        topY: top * TS,
        botY: (bottom + 1) * TS,
        centerY: (top * TS + (bottom + 1) * TS) / 2
      };
    }

    function reboundTuning(depthPixels, massPixels) {
      var targetRiseTiles = reboundTargetRiseTiles(depthPixels, massPixels);
      return {
        targetRiseTiles: targetRiseTiles,
        launchVelocity: launchSpeedForRiseTiles(targetRiseTiles)
      };
    }

    function reboundDepthLevel(depthPixels, massPixels) {
      if (depthPixels <= 0 || massPixels <= 0) return 0;
      var maxDepthLevel = Math.min(massPixels / TS, CONFIG.REBOUND_TUNED_MAX_ROWS);
      return clamp(depthPixels / TS, 0, maxDepthLevel);
    }

    function reboundTargetRiseTiles(depthPixels, massPixels) {
      var depthLevel = reboundDepthLevel(depthPixels, massPixels);
      if (depthLevel <= 0) return 0;
      return Math.pow(2, depthLevel - 1) + depthLevel;
    }

    function reboundMeterLevel(depthPixels, massPixels) {
      return reboundDepthLevel(depthPixels, massPixels);
    }

    var launchSpeedCache = {};

    function ballisticRisePixels(launchSpeed) {
      var vy = -launchSpeed;
      var y = 0;
      var peak = 0;
      for (var i = 0; i < 240; i++) {
        vy = Math.min(CONFIG.MAX_FALL_SPEED, vy + CONFIG.GRAVITY);
        y += vy;
        peak = Math.min(peak, y);
        if (vy >= 0 && y > peak) break;
      }
      return -peak;
    }

    function launchSpeedForRiseTiles(riseTiles) {
      var targetPixels = Math.max(0, riseTiles) * TS;
      if (targetPixels <= 0) return 0;
      var cacheKey = Math.round(targetPixels * 1000);
      if (launchSpeedCache[cacheKey] !== undefined) return launchSpeedCache[cacheKey];
      var low = 0;
      var high = 64;
      while (ballisticRisePixels(high) < targetPixels) high *= 2;
      for (var i = 0; i < 24; i++) {
        var mid = (low + high) / 2;
        if (ballisticRisePixels(mid) < targetPixels) {
          low = mid;
        } else {
          high = mid;
        }
      }
      launchSpeedCache[cacheKey] = high;
      return high;
    }

    function reboundVisualCharge(targetRiseTiles) {
      return clamp(targetRiseTiles / 8, CONFIG.REBOUND_SHALLOW_MIN_FACTOR, CONFIG.REBOUND_MAX_CHARGE);
    }

    function passThroughTargetFallTiles(massRows) {
      if (massRows > CONFIG.PERMEATE_TUNED_MAX_ROWS) return Infinity;
      return Math.min(Math.pow(2, massRows), CONFIG.PERMEATE_DIVE_MAX_TARGET_TILES);
    }

    function permeationBottomBrake(mass, rect) {
      if (!mass || mass.botY === undefined) return 0;
      var feetDepth = rect.y + rect.h - mass.topY;
      var fullChargeDepth = CONFIG.PLAYER_H + TS;
      var deepStart = Math.min(fullChargeDepth, mass.botY - mass.topY);
      var deepSpan = Math.max(TS, mass.botY - mass.topY - deepStart);
      var bottomProgress = clamp((feetDepth - deepStart) / deepSpan, 0, 1);
      var overExit = clamp((feetDepth - (mass.botY - mass.topY)) / CONFIG.PLAYER_H, 0, 1);
      return CONFIG.PERMEATE_BOTTOM_BRAKE_ACCEL * Math.max(bottomProgress, overExit);
    }

    function staticMassInfo(rect, sampleRect) {
      var sample = sampleRect || bottomHalfRect(rect);
      var ext = contiguousMassExtents(sample);
      if (!ext || overlappingSolidTiles(sample).length === 0) {
        return null;
      }

      var massPixels = ext.botY - ext.topY;
      var depthPixels = clamp(rect.y + rect.h - ext.topY, 0, Math.max(CONFIG.PLAYER_H + TS * 2, massPixels));
      var tuning = reboundTuning(depthPixels, massPixels);
      var targetRiseTiles = tuning.targetRiseTiles;
      var launchVelocity = tuning.launchVelocity;
      var strength = reboundVisualCharge(targetRiseTiles);
      var meterLevel = reboundMeterLevel(depthPixels, massPixels);
      var rows = Math.ceil(depthPixels / TS);
      return {
        type: "tile",
        pixels: depthPixels,
        meterLevel: meterLevel,
        strength: strength,
        rows: rows,
        massRows: ext.botRow - ext.topRow + 1,
        targetRiseTiles: targetRiseTiles,
        launchVelocity: launchVelocity,
        centerY: ext.centerY,
        topY: ext.topY,
        botY: ext.botY,
        exitY: ext.topY - rect.h,
        stuck: false,
        entity: null
      };
    }

    function entityMassInfo(rect, sampleRect) {
      var sample = sampleRect || bottomHalfRect(rect);
      var best = null;
      for (var i = 0; i < entities.length; i++) {
        var e = entities[i];
        if (!e.solid || !rectsOverlap(sample, entityRect(e))) continue;
        var massPixels = e.h;
        var depthPixels = clamp(rect.y + rect.h - e.y, 0, Math.max(CONFIG.PLAYER_H + TS * 2, massPixels));
        var tuning = reboundTuning(depthPixels, massPixels);
        var targetRiseTiles = tuning.targetRiseTiles;
        var launchVelocity = tuning.launchVelocity;
        var strength = reboundVisualCharge(targetRiseTiles);
        var meterLevel = reboundMeterLevel(depthPixels, massPixels);
        if (!best || strength > best.strength) {
          best = {
            type: e.type,
            pixels: depthPixels,
            meterLevel: meterLevel,
            strength: strength,
            rows: Math.ceil(depthPixels / TS),
            massRows: Math.ceil(massPixels / TS),
            targetRiseTiles: targetRiseTiles,
            launchVelocity: launchVelocity,
            centerY: e.y + e.h / 2,
            topY: e.y,
            botY: e.y + e.h,
            exitY: e.y - rect.h,
            entity: e,
            stuck: false
          };
        }
      }
      return best;
    }

    function matterMassInfo(rect, sampleRect) {
      var stat = staticMassInfo(rect, sampleRect);
      var ent = entityMassInfo(rect, sampleRect);
      if (ent && (!stat || ent.strength > stat.strength)) return ent;
      if (stat) return stat;
      return {
        pixels: 0,
        meterLevel: 0,
        strength: 0,
        rows: 0,
        massRows: 0,
        targetRiseTiles: 0,
        launchVelocity: 0,
        centerY: null,
        topY: 0,
        botY: 0,
        exitY: null,
        stuck: false,
        entity: null
      };
    }

    function rectFullyInsideStaticMatter(rect) {
      var left = Math.floor(rect.x / TS);
      var right = Math.floor((rect.x + rect.w - 0.001) / TS);
      var top = Math.floor(rect.y / TS);
      var bottom = Math.floor((rect.y + rect.h - 0.001) / TS);
      if (left < 0 || right >= COLS || top < 0 || bottom >= ROWS) return false;
      for (var r = top; r <= bottom; r++) {
        for (var c = left; c <= right; c++) {
          if (!isSolidTile(c, r)) return false;
        }
      }
      return true;
    }

    function rectFullyInsideEntityMatter(rect) {
      for (var i = 0; i < entities.length; i++) {
        var e = entities[i];
        if (!e.solid) continue;
        if (rect.x >= e.x && rect.x + rect.w <= e.x + e.w &&
            rect.y >= e.y && rect.y + rect.h <= e.y + e.h) {
          return true;
        }
      }
      return false;
    }

    function bottomHalfFullyInsideMatter(rect) {
      var lower = bottomHalfRect(rect);
      return rectFullyInsideStaticMatter(lower) || rectFullyInsideEntityMatter(lower);
    }

    function ceilingHangInfo(rect) {
      if (player.state !== "permeating" || player.permeateUntilClear) {
        return { active: false, mass: null };
      }
      if (overlappingMatter(rect).length === 0 || bottomHalfOverlapsSolid(rect)) {
        return { active: false, mass: null };
      }
      return { active: true, mass: matterMassInfo(rect, rect) };
    }

    function isPassThroughDive(mass) {
      if (!mass) return false;
      var massRows = mass.massRows || 1;
      var targetFallTiles = passThroughTargetFallTiles(massRows);
      var fallBeforeMatter = player.permeateStartFeetY === null ? 0 :
        Math.max(0, (mass.topY - player.permeateStartFeetY) / TS);
      var fallDive = isFinite(targetFallTiles) && fallBeforeMatter >= targetFallTiles;
      var speedDive = massRows <= CONFIG.PERMEATE_TUNED_MAX_ROWS && fallBeforeMatter < 0.001 &&
        player.vy >= CONFIG.MAX_FALL_SPEED - 0.001;
      return fallDive || speedDive;
    }

    function embeddedDepthInfo(rect) {
      var mass = matterMassInfo(rect);
      return { pixels: mass.pixels, meterLevel: mass.meterLevel, strength: mass.strength, entity: mass.entity };
    }

    function shouldRebound(rect) {
      if (!bottomHalfOverlapsSolid(rect)) return { fire: false, stuck: false, rows: 0, depth: 0, meterLevel: 0, strength: 0 };
      var mass = matterMassInfo(rect);
      return {
        fire: true,
        stuck: !!mass.stuck,
        rows: mass.rows,
        depth: mass.pixels,
        meterLevel: mass.meterLevel,
        strength: mass.strength,
        targetRiseTiles: mass.targetRiseTiles,
        launchVelocity: mass.launchVelocity,
        exitY: mass.exitY,
        entity: mass.entity || null
      };
    }

    function setStuck() {
      player.state = "stuck";
      player.vx = 0;
      player.vy = 0;
      player.stuckTimer = CONFIG.STUCK_DURATION;
      player.flashTimer = CONFIG.STUCK_DURATION;
      player.reboundSurfaced = false;
      player.reboundAirborneTimer = 0;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      player.permeateUntilClear = false;
      player.permeateStartFeetY = null;
      player.ceilingPullMode = null;
      player.embeddedDepth = 0;
      player.reboundMeterLevel = 0;
      player.reboundStrength = 0;
      player.reboundTargetRiseTiles = 0;
      player.reboundLaunchVelocity = 0;
      player.reboundExitY = null;
      shake = 16;
      spawnRipple(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H / 2, 0.8);
    }

    function beginRebound(result) {
      player.state = "rebounding";
      player.vy = Math.min(player.vy, -CONFIG.REBOUND_SURFACE_SPEED);
      player.reboundSurfaced = false;
      player.reboundAirborneTimer = CONFIG.REBOUND_STATE_DURATION;
      player.permeateUntilClear = false;
      player.permeateStartFeetY = null;
      player.ceilingPullMode = null;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      player.embeddedDepth = result && result.depth ? result.depth : 0;
      player.reboundMeterLevel = result && result.meterLevel ? result.meterLevel : 0;
      player.reboundStrength = result && result.strength ? result.strength : 0.35;
      player.reboundTargetRiseTiles = result && result.targetRiseTiles ? result.targetRiseTiles : 0;
      player.reboundLaunchVelocity = result && result.launchVelocity ? result.launchVelocity : 0;
      player.reboundExitY = result && result.exitY !== undefined ? result.exitY : null;
      var visualCharge = clamp(player.reboundMeterLevel / CONFIG.REBOUND_TUNED_MAX_ROWS, 0, 1);
      shake = 5 + visualCharge * 16;
      spawnRipple(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H / 2, visualCharge);
      for (var i = 0; i < 22; i++) {
        spawnMatterParticle(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H / 2, visualCharge, true);
      }
    }

    function consumeReboundExit() {
      if (player.queuedPermeate) {
        player.state = "permeating";
        player.permeateUntilClear = false;
        player.permeateStartFeetY = player.y + CONFIG.PLAYER_H;
        player.ceilingPullMode = null;
        player.queuedPermeate = false;
        player.queuedPermeateSource = null;
        player.reboundSurfaced = false;
        player.embeddedDepth = 0;
        player.reboundMeterLevel = 0;
        return;
      }
      if (overlappingMatter(playerRect()).length > 0) {
        setStuck();
        return;
      }
      player.state = "solid";
      player.reboundSurfaced = false;
      player.reboundAirborneTimer = 0;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      player.permeateStartFeetY = null;
      player.ceilingPullMode = null;
      player.embeddedDepth = 0;
      player.reboundMeterLevel = 0;
      player.reboundStrength = 0;
      player.reboundTargetRiseTiles = 0;
      player.reboundLaunchVelocity = 0;
      player.reboundExitY = null;
    }

    function moveAndCollide(dx, dy) {
      player.grounded = false;
      moveAxis("x", dx);
      moveAxis("y", dy);
    }

    function moveAxis(axis, amount) {
      var sign = Math.sign(amount);
      var remaining = Math.abs(amount);
      while (remaining > 0) {
        var stepAmount = Math.min(1, remaining) * sign;
        if (axis === "x") {
          player.x += stepAmount;
          var xHits = overlappingMatter(playerRect());
          if (xHits.length > 0) {
            if (sign > 0) {
              var minX = xHits.reduce(function (m, t) { return Math.min(m, t.x); }, Infinity);
              player.x = minX - CONFIG.PLAYER_W;
            } else {
              var maxX = xHits.reduce(function (m, t) { return Math.max(m, t.x + t.w); }, -Infinity);
              player.x = maxX;
            }
            player.vx = 0;
            break;
          }
        } else {
          player.y += stepAmount;
          var yHits = overlappingMatter(playerRect());
          if (yHits.length > 0) {
            if (sign > 0) {
              var minY = yHits.reduce(function (m, t) { return Math.min(m, t.y); }, Infinity);
              player.y = minY - CONFIG.PLAYER_H;
            } else {
              var maxY = yHits.reduce(function (m, t) { return Math.max(m, t.y + t.h); }, -Infinity);
              player.y = maxY;
            }
            if (sign > 0) player.grounded = true;
            player.vy = 0;
            break;
          }
        }
        remaining -= Math.abs(stepAmount);
      }
      player.x = clamp(player.x, 0, levelW - CONFIG.PLAYER_W);
      player.y = Math.min(player.y, levelH - CONFIG.PLAYER_H);
    }

    function probeGrounded() {
      if (overlappingMatter(playerRect()).length > 0) {
        player.grounded = false;
        return false;
      }
      var rect = playerRect();
      var probe = { x: rect.x, y: rect.y + 1, w: rect.w, h: rect.h };
      player.grounded = overlappingMatter(probe).length > 0;
      return player.grounded;
    }

    function placePlayerAtCell(c, r) {
      player.x = c * TS + (TS - CONFIG.PLAYER_W) / 2;
      player.y = (r + 1) * TS - CONFIG.PLAYER_H;
      player.vx = 0;
      player.vy = 0;
      player.state = "solid";
      player.won = false;
      player.permeateUntilClear = false;
      player.queuedPermeate = false;
      player.queuedPermeateSource = null;
      player.permeateStartFeetY = null;
      player.embeddedDepth = 0;
      player.reboundMeterLevel = 0;
      player.reboundStrength = 0;
      player.reboundTargetRiseTiles = 0;
      player.reboundLaunchVelocity = 0;
      player.reboundExitY = null;
      probeGrounded();
    }

    function recoverToCheckpoint() {
      spawnPlayer();
      player.flashTimer = 0.35;
      shake = 10;
      spawnRipple(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H / 2, 0.55);
    }

    function updateCheckpointState() {
      var rect = playerRect();
      for (var i = 0; i < checkpoints.length; i++) {
        var cp = checkpoints[i];
        if (rectsOverlap(rect, cp) && cp.order > (activeCheckpoint.order || 0)) activeCheckpoint = cp;
      }
    }

    function standingOnPreviousEntity(e) {
      var rect = playerRect();
      var feet = rect.y + rect.h;
      var overlapX = rect.x + rect.w > e.prevX + 1 && rect.x < e.prevX + e.w - 1;
      return overlapX && feet >= e.prevY - 2 && feet <= e.prevY + 4;
    }

    function carryPlayerOnEntities() {
      if (player.state !== "solid" && !(player.state === "rebounding" && player.reboundSurfaced)) return;
      for (var i = 0; i < entities.length; i++) {
        var e = entities[i];
        if (!e.solid || e.type !== "mover" || !standingOnPreviousEntity(e)) continue;
        player.x += e.dx;
        player.y += e.dy;
      }
      player.x = clamp(player.x, 0, levelW - CONFIG.PLAYER_W);
      player.y = Math.min(player.y, levelH - CONFIG.PLAYER_H);
    }

    function handleAsteroidImpacts() {
      if (player.state === "permeating" || (player.state === "rebounding" && !player.reboundSurfaced)) return false;
      var rect = playerRect();
      var impactProbe = { x: rect.x, y: rect.y + 1, w: rect.w, h: rect.h };
      for (var i = 0; i < entities.length; i++) {
        var e = entities[i];
        if (e.type === "asteroid" && (rectsOverlap(rect, entityRect(e)) || rectsOverlap(impactProbe, entityRect(e)))) {
          recoverToCheckpoint();
          return true;
        }
      }
      return false;
    }

    function triggerReboundOrStuck(result) {
      if (result.stuck) {
        setStuck();
      } else {
        beginRebound(result);
      }
    }

    // === STEP (fixed dt) ===
    function step(dt) {
      var skipVerticalForce = false;

      keyEdge.Space = !!keyEdge.Space;
      keyEdge.KeyW = !!keyEdge.KeyW;
      keyEdge.ArrowUp = !!keyEdge.ArrowUp;
      keyReleased.Space = !!keyReleased.Space;
      keyReleased.KeyW = !!keyReleased.KeyW;
      keyReleased.ArrowUp = !!keyReleased.ArrowUp;
      if (jumpPressed()) player.jumpBufferTimer = CONFIG.JUMP_BUFFER_FRAMES;

      player.coyoteTimer = Math.max(0, player.coyoteTimer - 1);
      player.jumpBufferTimer = Math.max(0, player.jumpBufferTimer - 1);
      player.flashTimer = Math.max(0, player.flashTimer - dt);
      updateEffects(dt);

      if (keyEdge.KeyR) {
        spawnPlayer();
        clearEdges();
        return;
      }

      if (player.state === "won") {
        if (keyEdge.Space || keyEdge.Enter) {
          nextLevel();
        }
        clearEdges();
        return;
      }

      if (player.state === "stuck") {
        player.stuckTimer -= dt;
        if (player.stuckTimer <= 0) spawnPlayer();
        clearEdges();
        return;
      }

      updateEntities(dt);
      carryPlayerOnEntities();
      if (handleAsteroidImpacts()) {
        clearEdges();
        return;
      }

      var ceilingHang = ceilingHangInfo(playerRect());
      var permeatingEmbedded = player.state === "permeating" &&
        !player.permeateUntilClear &&
        overlappingMatter(playerRect()).length > 0;
      if (!permeatingEmbedded) player.ceilingPullMode = null;
      if (ceilingHang.active && keyEdge.Space) {
        player.ceilingPullMode = "space";
        player.jumpBufferTimer = 0;
        keyEdge.Space = false;
      }
      if (ceilingHang.active && assistHeld()) player.ceilingPullMode = "assist";
      if (player.ceilingPullMode === "assist" && !assistHeld()) player.ceilingPullMode = null;
      if (player.ceilingPullMode === "space" && !ceilingHang.active) player.ceilingPullMode = null;

      var genericAutoChainActive = !!(permeateHeld() && assistHeld());
      var ceilingAssistReady = !!(player.ceilingPullMode === "assist" && assistHeld() &&
        bottomHalfFullyInsideMatter(playerRect()));
      var autoChainActive = genericAutoChainActive && (player.ceilingPullMode !== "assist" || ceilingAssistReady);
      if (!autoChainActive && player.queuedPermeateSource === "auto") {
        player.queuedPermeate = false;
        player.queuedPermeateSource = null;
      }

      if (permeatePressed() && player.permeateUntilClear) {
        player.permeateUntilClear = false;
      }

      if (player.state === "solid" && permeatePressed()) {
        player.state = "permeating";
        player.permeateUntilClear = false;
        player.permeateStartFeetY = player.y + CONFIG.PLAYER_H;
      }

      if (player.state === "rebounding") {
        if (permeatePressed()) {
          player.queuedPermeate = true;
          player.queuedPermeateSource = "manual";
        }
        if (autoChainActive) {
          player.queuedPermeate = true;
          player.queuedPermeateSource = "auto";
        }
        if (player.queuedPermeateSource === "manual" && permeateReleased()) {
          player.queuedPermeate = false;
          player.queuedPermeateSource = null;
        }
        if (player.queuedPermeateSource === "auto" && (!permeateHeld() || !assistHeld())) {
          player.queuedPermeate = false;
          player.queuedPermeateSource = null;
        }
      }

      if (player.state === "permeating") {
        var rect = playerRect();
        var fullOverlap = overlappingMatter(rect).length > 0;
        var mass = matterMassInfo(rect);
        var rebound = shouldRebound(rect);
        player.embeddedDepth = rebound.depth || (fullOverlap ? mass.pixels : 0);
        player.reboundMeterLevel = rebound.meterLevel || (fullOverlap ? mass.meterLevel : 0);
        if ((autoChainActive || ceilingAssistReady) && rebound.fire) {
          triggerReboundOrStuck(rebound);
          if (player.state === "rebounding" && genericAutoChainActive) {
            player.queuedPermeate = true;
            player.queuedPermeateSource = "auto";
          }
          skipVerticalForce = true;
        } else if (permeateReleased() && !player.permeateUntilClear) {
          if (rebound.fire) {
            triggerReboundOrStuck(rebound);
            skipVerticalForce = true;
          } else if (fullOverlap) {
            player.permeateUntilClear = true;
          } else {
            player.state = "solid";
            player.permeateStartFeetY = null;
            player.ceilingPullMode = null;
            player.embeddedDepth = 0;
            player.reboundMeterLevel = 0;
          }
        }
      }

      if (player.state === "permeating" && player.permeateUntilClear && overlappingMatter(playerRect()).length === 0) {
        player.permeateUntilClear = false;
        player.state = "solid";
        player.permeateStartFeetY = null;
        player.ceilingPullMode = null;
        player.embeddedDepth = 0;
        player.reboundMeterLevel = 0;
      }

      var moveInput = (keys.ArrowRight || keys.KeyD ? 1 : 0) - (keys.ArrowLeft || keys.KeyA ? 1 : 0);
      if (moveInput !== 0) player.facing = moveInput;
      var accel = CONFIG.MOVE_ACCEL * (player.state === "rebounding" ? CONFIG.REBOUND_AIR_CONTROL : 1);
      if (moveInput !== 0) {
        player.vx += moveInput * accel;
        if (player.state !== "rebounding") player.vx = clamp(player.vx, -CONFIG.MAX_RUN_SPEED, CONFIG.MAX_RUN_SPEED);
      } else {
        player.vx = approach(player.vx, 0, CONFIG.MOVE_DECEL);
      }

      var canJump = (player.state === "solid" || (player.state === "rebounding" && player.reboundSurfaced)) &&
        (player.grounded || player.coyoteTimer > 0);
      if (player.jumpBufferTimer > 0 && canJump) {
        player.vy = CONFIG.JUMP_VELOCITY;
        player.jumpBufferTimer = 0;
        player.coyoteTimer = 0;
        player.grounded = false;
        skipVerticalForce = true;
        spawnRipple(player.x + CONFIG.PLAYER_W / 2, player.y + CONFIG.PLAYER_H, 0.25);
      }
      if (jumpReleased() && player.vy < CONFIG.JUMP_CUT_VELOCITY) {
        player.vy = CONFIG.JUMP_CUT_VELOCITY;
        skipVerticalForce = true;
      }

      var embedded = overlappingMatter(playerRect()).length > 0;
      if (player.state === "permeating" && embedded && Math.random() < 0.45) {
        var chargeForParticle = clamp((player.reboundMeterLevel || 0) / CONFIG.REBOUND_TUNED_MAX_ROWS, 0, 1);
        spawnMatterParticle(
          player.x + CONFIG.PLAYER_W / 2 + (Math.random() - 0.5) * CONFIG.PLAYER_W,
          player.y + CONFIG.PLAYER_H / 2,
          chargeForParticle,
          false
        );
      }
      if (!skipVerticalForce) {
        if (player.state === "permeating") {
          if (embedded && !player.permeateUntilClear) {
            // Permeation is viscous, not free-fall: drag bleeds off speed and a
            // gentle center-pull nudges the player toward the contiguous mass's
            // vertical midpoint. Top-half-only permeation is an intentional hang
            // until Space or Ctrl asks the matter to pull the player inward.
            var activeHang = ceilingHangInfo(playerRect());
            var hangPulling = activeHang.active && player.ceilingPullMode !== null;
            if (activeHang.active && !hangPulling) {
              var hangMass = activeHang.mass || matterMassInfo(playerRect(), playerRect());
              if (!isPassThroughDive(hangMass)) player.vy = 0;
            } else {
              var pullMass = activeHang.active && activeHang.mass ? activeHang.mass : matterMassInfo(playerRect());
              var resistance = isPassThroughDive(pullMass) ? 0 : 1;
              player.vy *= (1 - CONFIG.PERMEATE_DRAG * resistance);
              if (pullMass.centerY !== null) {
                var center = player.y + CONFIG.PLAYER_H / 2;
                if (Math.abs(pullMass.centerY - center) > 2) {
                  player.vy += Math.sign(pullMass.centerY - center) * CONFIG.PERMEATE_PULL_ACCEL * resistance;
                }
                player.vy -= permeationBottomBrake(pullMass, playerRect()) * resistance;
              }
              player.vy = clamp(player.vy, -CONFIG.PERMEATE_MATTER_MAX_SPEED, CONFIG.PERMEATE_MATTER_MAX_SPEED);
            }
          } else {
            player.embeddedDepth = 0;
            player.reboundMeterLevel = 0;
            player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
          }
        } else if (player.state === "rebounding") {
          var travelingToExit = !player.reboundSurfaced &&
            (player.reboundExitY === null || player.y > player.reboundExitY);
          if (travelingToExit) {
            // Rebound target height is measured from the planned exit. Travel
            // to the planned exit is direct, then surfacing applies the exact launch
            // velocity needed for the remaining open-air rise.
            player.vy = Math.min(player.vy, -CONFIG.REBOUND_SURFACE_SPEED);
          } else {
            if (!player.reboundSurfaced) {
              player.reboundSurfaced = true;
              player.reboundAirborneTimer = CONFIG.REBOUND_STATE_DURATION;
            }
            player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
            player.reboundAirborneTimer -= dt;
          }
        } else {
          player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
        }
      }

      embedded = overlappingMatter(playerRect()).length > 0;
      var reboundingToExit = player.state === "rebounding" && !player.reboundSurfaced;
      if (player.state === "permeating" || reboundingToExit) {
        player.x += player.vx;
        player.y += player.vy;
        player.x = clamp(player.x, 0, levelW - CONFIG.PLAYER_W);
        player.y = clamp(player.y, -levelH, levelH - CONFIG.PLAYER_H);
        player.grounded = false;
      } else {
        moveAndCollide(player.vx, player.vy);
      }

      if (player.state === "permeating" && player.ceilingPullMode === "assist" && assistHeld() &&
          bottomHalfFullyInsideMatter(playerRect())) {
        var assistedRebound = shouldRebound(playerRect());
        if (assistedRebound.fire) {
          triggerReboundOrStuck(assistedRebound);
          if (player.state === "rebounding" && genericAutoChainActive) {
            player.queuedPermeate = true;
            player.queuedPermeateSource = "auto";
          }
        }
      }

      probeGrounded();
      if (player.grounded) player.coyoteTimer = CONFIG.COYOTE_FRAMES;
      updateCheckpointState();
      if (handleAsteroidImpacts()) {
        clearEdges();
        return;
      }

      if (player.state === "rebounding") {
        if (!player.reboundSurfaced) {
          var reachedExit = player.reboundExitY === null ?
            overlappingMatter(playerRect()).length === 0 :
            player.y <= player.reboundExitY;
          if (reachedExit) {
            if (player.reboundExitY !== null) {
              player.y = player.reboundExitY;
            }
            player.vy = -player.reboundLaunchVelocity;
            player.reboundSurfaced = true;
            player.reboundAirborneTimer = CONFIG.REBOUND_STATE_DURATION;
            probeGrounded();
          }
        }
        if (player.reboundSurfaced) {
          consumeReboundExit();
        }
      }

      if (rectsOverlap(playerRect(), goalRect)) {
        player.state = "won";
        player.won = true;
        player.embeddedDepth = 0;
        player.reboundMeterLevel = 0;
        spawnRipple(goalRect.x + goalRect.w / 2, goalRect.y + goalRect.h / 2, 1);
      }

      clearEdges();
    }

    function clearEdges() {
      for (var k in keyEdge) keyEdge[k] = false;
      for (var r in keyReleased) keyReleased[r] = false;
    }

    // === RENDER ===
    var cameraX = 0;
    var cameraY = 0;

    function updateCamera() {
      cameraX = clamp(
        player.x + CONFIG.PLAYER_W / 2 - CONFIG.VIEW_W / 2,
        0,
        Math.max(0, levelW - CONFIG.VIEW_W)
      );
      cameraY = clamp(
        player.y + CONFIG.PLAYER_H / 2 - CONFIG.VIEW_H / 2,
        0,
        Math.max(0, levelH - CONFIG.VIEW_H)
      );
    }

    function draw() {
      updateCamera();
      ctx.clearRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.fillStyle = "#060814";
      ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);

      ctx.save();
      var sx = shake ? (Math.random() - 0.5) * shake : 0;
      var sy = shake ? (Math.random() - 0.5) * shake : 0;
      ctx.translate(sx - Math.round(cameraX), sy - Math.round(cameraY));
      drawBackground();
      drawTiles();
      drawEntities();
      drawGoal();
      drawParticles();
      drawPlayer();
      ctx.restore();

      drawHud();
      drawOverlay();
      if (player.won) drawWin();
    }

    function drawBackground() {
      var sky = ctx.createLinearGradient(0, 0, 0, levelH);
      sky.addColorStop(0, "#030512");
      sky.addColorStop(0.34, "#0b1236");
      sky.addColorStop(0.68, "#171044");
      sky.addColorStop(1, "#050615");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, levelW, levelH);

      ctx.save();
      var nebula = ctx.createRadialGradient(levelW * 0.56, 165, 18, levelW * 0.56, 165, 520);
      nebula.addColorStop(0, "rgba(115, 231, 255, 0.34)");
      nebula.addColorStop(0.28, "rgba(105, 98, 255, 0.18)");
      nebula.addColorStop(0.58, "rgba(221, 77, 255, 0.13)");
      nebula.addColorStop(1, "rgba(7, 9, 24, 0)");
      ctx.fillStyle = nebula;
      ctx.fillRect(0, 0, levelW, 680);

      ctx.globalAlpha = 0.86;
      for (var s = 0; s < 95; s++) {
        var sx = (s * 83) % levelW;
        var sy = 26 + ((s * 137) % Math.max(1, levelH - 90));
        var twinkle = 0.34 + 0.28 * Math.sin(performance.now() * 0.0018 + s);
        ctx.fillStyle = s % 5 === 0 ?
          "rgba(173, 234, 255, " + twinkle.toFixed(3) + ")" :
          "rgba(246, 243, 255, " + (twinkle * 0.72).toFixed(3) + ")";
        ctx.beginPath();
        ctx.arc(sx, sy, s % 7 === 0 ? 1.4 : 0.8, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 0.38;
      for (var i = 0; i < 11; i++) {
        var mx = i * 112 - 60;
        var my = 145 + Math.sin(i * 1.8) * 44;
        ctx.fillStyle = i % 2 ? "#161d47" : "#24154d";
        ctx.beginPath();
        ctx.moveTo(mx - 80, levelH);
        ctx.lineTo(mx + 48, my);
        ctx.lineTo(mx + 190, levelH);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      ctx.strokeStyle = "rgba(119, 225, 255, 0.12)";
      ctx.lineWidth = 1;
      for (var y = 70; y <= levelH; y += 56) {
        ctx.beginPath();
        for (var x = -40; x <= levelW + 40; x += 28) {
          var wobble = Math.sin(x * 0.018 + y * 0.05 + performance.now() * 0.0007) * 5;
          if (x === -40) ctx.moveTo(x, y + wobble);
          else ctx.lineTo(x, y + wobble);
        }
        ctx.stroke();
      }

      ctx.save();
      ctx.globalAlpha = 0.5;
      for (var shard = 0; shard < 18; shard++) {
        var px = (shard * 149 + 52) % levelW;
        var py = 120 + ((shard * 211) % Math.max(1, levelH - 260));
        var drift = Math.sin(performance.now() * 0.001 + shard) * 7;
        ctx.fillStyle = shard % 2 ? "rgba(183, 89, 255, 0.22)" : "rgba(88, 216, 255, 0.18)";
        ctx.strokeStyle = shard % 2 ? "rgba(255, 120, 255, 0.42)" : "rgba(124, 234, 255, 0.36)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px, py + drift - 16);
        ctx.lineTo(px + 9, py + drift + 4);
        ctx.lineTo(px - 3, py + drift + 22);
        ctx.lineTo(px - 12, py + drift + 2);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawTiles() {
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (!tiles[r][c]) continue;
          var x = c * TS;
          var y = r * TS;
          var dense = r < ROWS - 2 || (r % 6 === 5);
          var grad = ctx.createLinearGradient(x, y, x, y + TS);
          if (dense) {
            grad.addColorStop(0, "#4b3578");
            grad.addColorStop(0.38, "#2b2253");
            grad.addColorStop(1, "#10162c");
          } else {
            grad.addColorStop(0, "#243b69");
            grad.addColorStop(1, "#0d1633");
          }
          ctx.fillStyle = grad;
          ctx.fillRect(x, y, TS, TS);
          ctx.fillStyle = dense ? "rgba(255, 109, 247, 0.18)" : "rgba(111, 232, 255, 0.2)";
          ctx.fillRect(x, y, TS, 3);
          ctx.save();
          ctx.beginPath();
          ctx.rect(x, y, TS, TS);
          ctx.clip();
          ctx.globalAlpha = dense ? 0.42 : 0.24;
          ctx.strokeStyle = dense ? "#ff6df7" : "#77e8ff";
          ctx.lineWidth = 1;
          for (var stripe = -TS; stripe < TS * 2; stripe += 17) {
            ctx.beginPath();
            ctx.moveTo(x + stripe, y + TS);
            ctx.lineTo(x + stripe + TS, y);
            ctx.stroke();
          }
          ctx.globalAlpha = dense ? 0.22 : 0.16;
          ctx.strokeStyle = "#eef4ff";
          ctx.beginPath();
          ctx.moveTo(x + 6, y + 7);
          ctx.lineTo(x + 19, y + 17);
          ctx.lineTo(x + 13, y + 29);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function drawEntities() {
      for (var i = 0; i < checkpoints.length; i++) {
        var cp = checkpoints[i];
        var active = activeCheckpoint.c === cp.c && activeCheckpoint.r === cp.r;
        ctx.save();
        ctx.globalAlpha = active ? 0.6 : 0.32;
        ctx.strokeStyle = active ? "#ff5cf4" : "#4be7ff";
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        roundRect(cp.x + 4, cp.y + 4, TS - 8, TS - 8, 6);
        ctx.stroke();
        ctx.restore();
      }

      for (var j = 0; j < entities.length; j++) {
        var e = entities[j];
        ctx.save();
        if (e.type === "asteroid") {
          if (e.warningActive) {
            ctx.globalAlpha = 0.2 + 0.18 * Math.sin(levelTime * 18 + j);
            ctx.fillStyle = "#ff5cf4";
            ctx.fillRect(e.x, 0, e.w, levelH);
            ctx.globalAlpha = 0.85;
          }
          ctx.shadowColor = "#ff5cf4";
          ctx.shadowBlur = 14;
          ctx.fillStyle = "#3b2859";
          ctx.strokeStyle = "#ff6df7";
          ctx.lineWidth = 2;
          roundRect(e.x, e.y, e.w, e.h, 10);
          ctx.fill();
          ctx.stroke();
          ctx.globalAlpha = 0.42;
          ctx.strokeStyle = "#f6f3ff";
          ctx.beginPath();
          ctx.moveTo(e.x + 8, e.y + e.h - 9);
          ctx.lineTo(e.x + e.w * 0.45, e.y + 8);
          ctx.lineTo(e.x + e.w - 10, e.y + e.h * 0.55);
          ctx.stroke();
        } else {
          var rebound = e.role === "rebound";
          var grad = ctx.createLinearGradient(e.x, e.y, e.x, e.y + e.h);
          grad.addColorStop(0, rebound ? "#5e367e" : "#255b78");
          grad.addColorStop(1, rebound ? "#171033" : "#0d2438");
          ctx.shadowColor = rebound ? "#ff5cf4" : "#4be7ff";
          ctx.shadowBlur = rebound ? 16 : 10;
          ctx.fillStyle = grad;
          ctx.strokeStyle = rebound ? "#ff6df7" : "#77e8ff";
          ctx.lineWidth = 2;
          roundRect(e.x, e.y, e.w, e.h, 6);
          ctx.fill();
          ctx.stroke();
          ctx.globalAlpha = 0.22;
          ctx.fillStyle = rebound ? "#ff5cf4" : "#4be7ff";
          ctx.fillRect(e.x, e.y, e.w, 4);
        }
        ctx.restore();
      }
    }

    function roundRect(x, y, w, h, r) {
      var rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
    }

    function drawGoal() {
      var active = player.won ? 1 : 0.54 + Math.sin(performance.now() * 0.006) * 0.12;
      ctx.save();
      ctx.globalAlpha = 0.94;
      ctx.shadowColor = "rgba(98, 224, 255, 0.7)";
      ctx.shadowBlur = 20;
      ctx.strokeStyle = "rgba(102, 231, 255, " + active.toFixed(3) + ")";
      ctx.lineWidth = 4;
      roundRect(goalRect.x, goalRect.y - 18, goalRect.w, goalRect.h + 36, 8);
      ctx.stroke();
      ctx.shadowColor = "rgba(255, 91, 244, 0.52)";
      ctx.strokeStyle = "rgba(255, 91, 244, " + (active * 0.72).toFixed(3) + ")";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(goalRect.x + goalRect.w / 2, goalRect.y + goalRect.h / 2, 20, 38, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = "rgba(102, 231, 255, " + (player.won ? 0.25 : 0.09) + ")";
      ctx.fill();
      ctx.shadowBlur = 14;
      ctx.fillStyle = "#f6f3ff";
      ctx.beginPath();
      ctx.arc(goalRect.x + goalRect.w / 2, goalRect.y + goalRect.h / 2, 5 + active * 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPlayer() {
      var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 110);
      var alpha = player.state === "permeating" ? 0.62 : 1;
      var cx = player.x + CONFIG.PLAYER_W / 2;
      var cy = player.y + CONFIG.PLAYER_H / 2;
      var meterLevel = clamp(player.reboundMeterLevel || 0, 0, CONFIG.REBOUND_TUNED_MAX_ROWS);
      var charge = meterLevel / CONFIG.REBOUND_TUNED_MAX_ROWS;
      var deepCharge = clamp((meterLevel - 2.5) / 2.5, 0, 1);

      if (player.state === "permeating" || player.state === "rebounding") {
        ctx.save();
        ctx.globalAlpha = player.state === "rebounding" ? 0.82 : 0.5 + charge * 0.3 + deepCharge * 0.12;
        ctx.shadowBlur = 18 + charge * 18 + deepCharge * 18;
        ctx.shadowColor = player.state === "rebounding" ? "#ff5cf4" : "#4be7ff";
        ctx.strokeStyle = player.state === "rebounding" ? "#ff5cf4" : "#4be7ff";
        ctx.lineWidth = 2 + charge * 3;
        ctx.beginPath();
        ctx.ellipse(cx, cy, CONFIG.PLAYER_W * (0.9 + charge * 0.7), CONFIG.PLAYER_H * 0.78, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha *= 0.68;
        ctx.beginPath();
        ctx.ellipse(cx, cy, CONFIG.PLAYER_W * (1.3 + charge * 0.7), CONFIG.PLAYER_H * 0.46, -0.55, 0, Math.PI * 2);
        ctx.stroke();
        if (deepCharge > 0) {
          ctx.globalAlpha = 0.28 + deepCharge * 0.38;
          ctx.shadowBlur = 28 + deepCharge * 20;
          ctx.shadowColor = "#ffd166";
          ctx.strokeStyle = "rgba(255, 209, 102, " + (0.45 + deepCharge * 0.45).toFixed(3) + ")";
          ctx.lineWidth = 2 + deepCharge * 3;
          ctx.beginPath();
          ctx.ellipse(cx, cy, CONFIG.PLAYER_W * (2 + deepCharge * 1.1), CONFIG.PLAYER_H * (0.9 + deepCharge * 0.35), -0.18, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      var glow = ctx.createRadialGradient(cx, cy, 2, cx, cy, 34 + charge * 42 + deepCharge * 26);
      glow.addColorStop(0, player.state === "rebounding" ? "rgba(255, 92, 244, 0.6)" : "rgba(75, 231, 255, 0.5)");
      glow.addColorStop(0.46, "rgba(181, 108, 255, 0.24)");
      glow.addColorStop(0.72, "rgba(255, 209, 102, " + (deepCharge * 0.26).toFixed(3) + ")");
      glow.addColorStop(1, "rgba(75, 231, 255, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, 34 + charge * 42 + deepCharge * 26, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = player.state === "solid" ? "rgba(139, 233, 255, 0.3)" : "rgba(255, 92, 244, 0.48)";
      ctx.shadowBlur = 12;
      ctx.fillStyle = player.won ? "#f6f3ff" :
        player.state === "stuck" ? "#ff5cf4" :
        player.state === "rebounding" ? "#f0dcff" :
        player.state === "permeating" ? "#93f4ff" : "#e9e0ff";
      roundRect(player.x, player.y, CONFIG.PLAYER_W, CONFIG.PLAYER_H, 7);
      ctx.fill();
      ctx.restore();

      ctx.lineWidth = 3;
      if (player.state === "permeating") {
        ctx.strokeStyle = "rgba(75, 231, 255, " + (0.52 + pulse * 0.45).toFixed(3) + ")";
      } else if (player.state === "rebounding") {
        ctx.strokeStyle = "#ff5cf4";
      } else if (player.state === "stuck" || player.flashTimer > 0) {
        ctx.strokeStyle = "#ff5cf4";
      } else if (player.won) {
        ctx.strokeStyle = "#66e7ff";
      } else {
        ctx.strokeStyle = "#140829";
      }
      roundRect(player.x - 1, player.y - 1, CONFIG.PLAYER_W + 2, CONFIG.PLAYER_H + 2, 8);
      ctx.stroke();

      ctx.fillStyle = "#17051d";
      var eyeX = player.facing > 0 ? player.x + CONFIG.PLAYER_W - 8 : player.x + 5;
      ctx.fillRect(eyeX, player.y + 10, 4, 4);
      ctx.fillStyle = "#5c2a97";
      ctx.fillRect(player.x + 5, player.y + CONFIG.PLAYER_H - 8, CONFIG.PLAYER_W - 10, 4);
    }

    function drawParticles() {
      for (var i = 0; i < ripples.length; i++) {
        var ripple = ripples[i];
        var alpha = clamp(ripple.life / ripple.maxLife, 0, 1);
        ctx.save();
        ctx.shadowColor = ripple.pressure > 0.6 ? "#ff5cf4" : "#4be7ff";
        ctx.shadowBlur = 16 + ripple.pressure * 18;
        ctx.strokeStyle = ripple.pressure > 0.6 ?
          "rgba(255, 92, 244, " + (alpha * 0.78).toFixed(3) + ")" :
          "rgba(75, 231, 255, " + (alpha * 0.72).toFixed(3) + ")";
        ctx.lineWidth = 2 + ripple.pressure * 3;
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(246, 243, 255, " + (alpha * 0.22).toFixed(3) + ")";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, ripple.radius * 0.58, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      for (var j = 0; j < particles.length; j++) {
        var p = particles[j];
        var lifeAlpha = clamp(p.life / p.maxLife, 0, 1);
        var spark = p.hot ? "rgba(255, 92, 244, " : "rgba(75, 231, 255, ";
        ctx.save();
        ctx.shadowColor = p.hot ? "#ff5cf4" : "#4be7ff";
        ctx.shadowBlur = 10;
        ctx.fillStyle = spark + lifeAlpha.toFixed(3) + ")";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * lifeAlpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(246, 243, 255, " + (lifeAlpha * 0.45).toFixed(3) + ")";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p.x - p.r * 1.5 * lifeAlpha, p.y);
        ctx.lineTo(p.x + p.r * 1.5 * lifeAlpha, p.y);
        ctx.moveTo(p.x, p.y - p.r * 1.5 * lifeAlpha);
        ctx.lineTo(p.x, p.y + p.r * 1.5 * lifeAlpha);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawOverlay() {
      var meterLevel = clamp(player.reboundMeterLevel || 0, 0, CONFIG.REBOUND_TUNED_MAX_ROWS);
      var depth = meterLevel / CONFIG.REBOUND_TUNED_MAX_ROWS;
      var deep = clamp((meterLevel - 2.5) / 2.5, 0, 1);
      if (depth <= 0 && player.flashTimer <= 0) return;
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalAlpha = depth * 0.14 + deep * 0.16 + (player.flashTimer > 0 ? 0.17 : 0);
      ctx.fillStyle = player.state === "stuck" ? "#ff5cf4" : deep > 0.2 ? "#ffd166" : "#4be7ff";
      ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.restore();
    }

    function drawHud() {
      var stateText = player.won ? "Won" : player.state.charAt(0).toUpperCase() + player.state.slice(1);
      var stateColor = {
        solid: "#8be9ff",
        permeating: "#4be7ff",
        rebounding: "#ff5cf4",
        stuck: "#ff5cf4",
        won: "#d8b4ff"
      }[player.won ? "won" : player.state];
      var meterLevel = clamp(player.reboundMeterLevel || 0, 0, CONFIG.REBOUND_TUNED_MAX_ROWS);
      var charge = meterLevel / CONFIG.REBOUND_TUNED_MAX_ROWS;
      var message = "solid state";
      if (player.state === "permeating") {
        message = player.permeateUntilClear ? "phasing through" : "release to rebound";
      } else if (player.state === "rebounding") {
        message = player.reboundMeterLevel >= 2.5 ? "deep rebound!" : "up, up and away!";
      } else if (player.state === "stuck") {
        message = "stuck";
      } else if (player.won) {
        message = isFinalLevel() ? "all rifts stable" : "press Space for next";
      } else {
        message = (currentLevelIndex + 1) + "/" + LEVELS.length + " " + LEVELS[currentLevelIndex].name;
      }

      if (stateLabel) {
        stateLabel.textContent = stateText;
        if (stateLabel.style) stateLabel.style.background = stateColor;
      }
      if (messageLabel) messageLabel.textContent = message;
      if (pressureMeter) {
        pressureMeter.setAttribute("aria-valuenow", meterLevel.toFixed(1));
        pressureMeter.setAttribute("aria-valuetext", meterLevel.toFixed(1) + "/5");
      }
      if (pressureFill && pressureFill.style) pressureFill.style.width = Math.round(charge * 100) + "%";
    }

    function drawWin() {
      var final = isFinalLevel();
      ctx.fillStyle = "rgba(4, 5, 16, 0.72)";
      ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.fillStyle = "#d8b4ff";
      ctx.font = "800 44px ui-sans-serif, system-ui";
      ctx.textAlign = "center";
      ctx.shadowColor = "#ff5cf4";
      ctx.shadowBlur = 18;
      ctx.fillText(final ? "All Rifts Stabilized" : "Rift Complete", CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 - 12);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#f6f3ff";
      ctx.font = "18px ui-sans-serif, system-ui";
      ctx.fillText(final ? "Press R for checkpoint" : "Press Space for next rift", CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 30);
      ctx.textAlign = "left";
    }

    // === LOOP ===
    var lastTime = performance.now();
    var accumulator = 0;

    function loop(now) {
      accumulator += Math.min(0.25, (now - lastTime) / 1000);
      lastTime = now;
      while (accumulator >= CONFIG.DT) {
        step(CONFIG.DT);
        accumulator -= CONFIG.DT;
      }
      renderOnly();
      requestAnimationFrame(loop);
    }

    function renderOnly() {
      updateCamera();
      ctx.clearRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.fillStyle = "#060814";
      ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
      ctx.save();
      var sx = shake ? (Math.random() - 0.5) * shake : 0;
      var sy = shake ? (Math.random() - 0.5) * shake : 0;
      ctx.translate(sx - Math.round(cameraX), sy - Math.round(cameraY));
      drawBackground();
      drawTiles();
      drawEntities();
      drawGoal();
      drawParticles();
      drawPlayer();
      ctx.restore();
      drawHud();
      drawOverlay();
      if (player.won) drawWin();
    }

    loadLevel(0);
    requestAnimationFrame(loop);

    window.gameInternals = {
      CONFIG: CONFIG,
      LEVELS: LEVELS,
      get LEVEL() { return LEVEL; },
      get currentLevelIndex() { return currentLevelIndex; },
      get ROWS() { return ROWS; },
      get COLS() { return COLS; },
      get levelW() { return levelW; },
      get levelH() { return levelH; },
      get cameraX() { return cameraX; },
      get cameraY() { return cameraY; },
      get tiles() { return tiles; },
      get entities() { return entities; },
      get checkpoints() { return checkpoints; },
      get activeCheckpoint() { return activeCheckpoint; },
      get levelTime() { return levelTime; },
      player: player,
      keys: keys,
      keyEdge: keyEdge,
      keyReleased: keyReleased,
      get spawnCell() { return spawnCell; },
      get goalRect() { return goalRect; },
      parseLevel: parseLevel,
      defineLevel: defineLevel,
      loadLevel: loadLevel,
      nextLevel: nextLevel,
      isFinalLevel: isFinalLevel,
      updateCamera: updateCamera,
      renderOnly: renderOnly,
      spawnPlayer: spawnPlayer,
      step: step,
      clearEdges: clearEdges,
      isSolidTile: isSolidTile,
      playerRect: playerRect,
      bottomHalfRect: bottomHalfRect,
      overlappingSolidTiles: overlappingSolidTiles,
      overlappingSolidEntities: overlappingSolidEntities,
      overlappingSolidMatter: overlappingSolidMatter,
      overlappingMatter: overlappingMatter,
      bottomHalfOverlapsSolid: bottomHalfOverlapsSolid,
      bottomHalfFullyInsideMatter: bottomHalfFullyInsideMatter,
      ceilingHangInfo: ceilingHangInfo,
      contiguousMassExtents: contiguousMassExtents,
      matterMassInfo: matterMassInfo,
      shouldRebound: shouldRebound,
      reboundMeterLevel: reboundMeterLevel,
      moveAndCollide: moveAndCollide,
      probeGrounded: probeGrounded,
      placePlayerAtCell: placePlayerAtCell,
      recoverToCheckpoint: recoverToCheckpoint,
      updateEntities: updateEntities,
      beginRebound: beginRebound
    };
  }());
  </script>
</body>
