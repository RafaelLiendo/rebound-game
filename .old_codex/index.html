<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Permeation Buoyancy</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070d;
      color: #f3f7ff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    canvas {
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      background: #07101b;
      outline: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="540"></canvas>

  <script>
  "use strict";

  // === CONFIG ===
  const CONFIG = {
    TILE_SIZE: 32,
    VIEW_W: 960,
    VIEW_H: 540,
    GRAVITY: 0.5,
    MAX_FALL_SPEED: 12,
    MOVE_ACCEL: 0.8,
    MOVE_DECEL: 1.2,
    MAX_RUN_SPEED: 5,
    JUMP_VELOCITY: -10,
    JUMP_CUT_VELOCITY: -3.5,
    COYOTE_FRAMES: 6,
    JUMP_BUFFER_FRAMES: 6,
    REBOUND_AIR_CONTROL: 0.5,
    REBOUND_STATE_DURATION: 0.4,
    BUOYANCY_ACCEL: 1.0,
    BUOYANCY_MAX_SPEED: 18,
    PERMEATE_DRAG: 0.08,
    PERMEATE_PULL_ACCEL: 0.3,
    PERMEATE_COOLDOWN: 0.2,
    STUCK_SEARCH_RADIUS: 6,
    STUCK_DURATION: 0.5,
    PLAYER_W: 24,
    PLAYER_H: 40,
    DT: 1 / 60
  };

  // === LEVEL DATA ===
  const LEVEL_DATA = [
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "...........................G..",
    "........................######",
    "..............................",
    "..............................",
    "..............................",
    "..............................",
    "........######################",
    "....##########################",
    "........######################",
    "........######################",
    "....##########################",
    "..............................",
    "..............................",
    "####..........................",
    "..............................",
    "..............................",
    "....###.......................",
    "..............................",
    "..............................",
    "####..........................",
    "..............................",
    "..............................",
    "....###.......................",
    "..............................",
    "..............................",
    "####..........................",
    "..............................",
    "..............................",
    "....###..######...............",
    "..............................",
    ".S............................",
    "##############################"
  ];

  // === LEVEL PARSER ===
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const TS = CONFIG.TILE_SIZE;
  const LEVEL_ROWS = LEVEL_DATA.length;
  const LEVEL_COLS = LEVEL_DATA[0].length;
  const LEVEL_W = LEVEL_COLS * TS;
  const LEVEL_H = LEVEL_ROWS * TS;
  const tiles = [];
  const spawnCell = { c: 1, r: 43 };
  let goalRect = { x: 0, y: 0, w: TS, h: TS };

  for (let r = 0; r < LEVEL_ROWS; r++) {
    tiles[r] = [];
    for (let c = 0; c < LEVEL_COLS; c++) {
      const ch = LEVEL_DATA[r][c];
      tiles[r][c] = ch === "#";
      if (ch === "S") {
        spawnCell.c = c;
        spawnCell.r = r;
      }
      if (ch === "G") {
        goalRect = { x: c * TS, y: r * TS, w: TS, h: TS };
      }
    }
  }

  // === INPUT ===
  const keys = Object.create(null);
  const keyEdge = Object.create(null);
  const keyReleased = Object.create(null);
  const inputAliases = {
    left: ["ArrowLeft", "KeyA"],
    right: ["ArrowRight", "KeyD"],
    jump: ["Space", "KeyW", "ArrowUp"],
    shift: ["ShiftLeft", "ShiftRight"],
    reset: ["KeyR"]
  };

  function anyDown(names) {
    return names.some((name) => keys[name]);
  }

  function anyEdge(names) {
    return names.some((name) => keyEdge[name]);
  }

  function anyReleased(names) {
    return names.some((name) => keyReleased[name]);
  }

  addEventListener("keydown", (event) => {
    if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space", "ShiftLeft", "ShiftRight"].includes(event.code)) {
      event.preventDefault();
    }
    if (!keys[event.code]) keyEdge[event.code] = true;
    keys[event.code] = true;
  });

  addEventListener("keyup", (event) => {
    if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space", "ShiftLeft", "ShiftRight"].includes(event.code)) {
      event.preventDefault();
    }
    keys[event.code] = false;
    keyReleased[event.code] = true;
  });

  // === PLAYER STATE ===
  const player = {
    x: 0,
    y: 0,
    vx: 0,
    vy: 0,
    state: "solid",
    facing: 1,
    grounded: false,
    coyoteTimer: 0,
    jumpBufferTimer: 0,
    reboundAirborneTimer: -1,
    permeateCooldownTimer: 0,
    permeateUntilClear: false,
    stuckTimer: 0,
    flashTimer: 0,
    won: false
  };

  let cameraY = 0;
  let time = 0;

  function spawnPlayer() {
    player.x = spawnCell.c * TS + (TS - CONFIG.PLAYER_W) / 2;
    player.y = spawnCell.r * TS + TS - CONFIG.PLAYER_H;
    player.vx = 0;
    player.vy = 0;
    player.state = "solid";
    player.facing = 1;
    player.grounded = false;
    player.coyoteTimer = 0;
    player.jumpBufferTimer = 0;
    player.reboundAirborneTimer = -1;
    player.permeateCooldownTimer = 0;
    player.permeateUntilClear = false;
    player.stuckTimer = 0;
    player.flashTimer = 0;
    player.won = false;
  }

  spawnPlayer();

  // === PHYSICS HELPERS ===
  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function approach(value, target, amount) {
    if (value < target) return Math.min(target, value + amount);
    if (value > target) return Math.max(target, value - amount);
    return value;
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w &&
      a.x + a.w > b.x &&
      a.y < b.y + b.h &&
      a.y + a.h > b.y;
  }

  function isSolidTile(c, r) {
    if (c < 0 || c >= LEVEL_COLS) return true;
    if (r < 0) return false;
    if (r >= LEVEL_ROWS) return true;
    return tiles[r][c];
  }

  function playerRect() {
    return { x: player.x, y: player.y, w: CONFIG.PLAYER_W, h: CONFIG.PLAYER_H };
  }

  function bottomHalfRect(rect) {
    return { x: rect.x, y: rect.y + rect.h / 2, w: rect.w, h: rect.h / 2 };
  }

  function tileKey(tile) {
    return tile.c + "," + tile.r;
  }

  function overlappingSolidTiles(rect) {
    const c0 = Math.floor(rect.x / TS);
    const c1 = Math.floor((rect.x + rect.w - 0.001) / TS);
    const r0 = Math.floor(rect.y / TS);
    const r1 = Math.floor((rect.y + rect.h - 0.001) / TS);
    const out = [];
    for (let r = r0; r <= r1; r++) {
      for (let c = c0; c <= c1; c++) {
        if (isSolidTile(c, r)) out.push({ c, r });
      }
    }
    return out;
  }

  function overlapsSolid(rect) {
    return overlappingSolidTiles(rect).length > 0;
  }

  function laneColumns(rect) {
    const c0 = Math.floor(rect.x / TS);
    const c1 = Math.floor((rect.x + rect.w - 0.001) / TS);
    return { c0, c1 };
  }

  function laneHasSolidRow(c0, c1, r) {
    for (let c = c0; c <= c1; c++) {
      if (isSolidTile(c, r)) return true;
    }
    return false;
  }

  function contiguousMassExtents(rect) {
    const { c0, c1 } = laneColumns(rect);
    const r0 = Math.floor(rect.y / TS);
    const r1 = Math.floor((rect.y + rect.h - 0.001) / TS);
    let anchorRow = null;

    for (let r = r0; r <= r1; r++) {
      if (laneHasSolidRow(c0, c1, r)) {
        anchorRow = r;
        break;
      }
    }

    if (anchorRow === null) return null;

    let topSolidRow = anchorRow;
    for (let r = anchorRow - 1; r >= 0; r--) {
      if (!laneHasSolidRow(c0, c1, r)) break;
      topSolidRow = r;
    }

    let botSolidRow = anchorRow;
    for (let r = anchorRow + 1; r < LEVEL_ROWS; r++) {
      if (!laneHasSolidRow(c0, c1, r)) break;
      botSolidRow = r;
    }

    const topY = topSolidRow * TS;
    const botY = (botSolidRow + 1) * TS;
    return { topY, botY, centerY: (topY + botY) / 2, anchorRow, topSolidRow, botSolidRow };
  }

  function castClearTilesInDirection(rect, dir) {
    if (dir !== "up") return 0;

    const { c0, c1 } = laneColumns(rect);
    const extents = contiguousMassExtents(rect);
    let r = extents ? extents.anchorRow : Math.floor((rect.y - 1) / TS);
    let solidCount = 0;

    while (r >= 0 && laneHasSolidRow(c0, c1, r)) {
      solidCount++;
      r--;
    }

    return solidCount;
  }

  function bottomHalfOverlapsSolid(rect) {
    return overlappingSolidTiles(bottomHalfRect(rect)).length > 0;
  }

  function shouldRebound(rect) {
    if (!bottomHalfOverlapsSolid(rect)) return { fire: false };
    const upClear = castClearTilesInDirection(rect, "up");
    if (upClear > CONFIG.STUCK_SEARCH_RADIUS) return { fire: true, stuck: true };
    return { fire: true, stuck: false };
  }

  function wouldHitSolid(candidate, ignored) {
    const tilesHit = overlappingSolidTiles(candidate);
    for (const tile of tilesHit) {
      if (!ignored || !ignored.has(tileKey(tile))) return true;
    }
    return false;
  }

  function moveAndCollide(dx, dy, options) {
    const ignoreExisting = options && options.ignoreExisting;
    const startIgnored = ignoreExisting ? new Set(overlappingSolidTiles(playerRect()).map(tileKey)) : null;
    let rect = playerRect();

    if (dx !== 0) {
      const targetX = player.x + dx;
      const step = Math.sign(dx);
      while (Math.abs(targetX - player.x) > 0.001) {
        const move = Math.min(Math.abs(targetX - player.x), 1) * step;
        const candidate = { x: player.x + move, y: player.y, w: rect.w, h: rect.h };
        if (wouldHitSolid(candidate, startIgnored)) {
          player.vx = 0;
          break;
        }
        player.x += move;
      }
    }

    rect = playerRect();
    if (dy !== 0) {
      const targetY = player.y + dy;
      const step = Math.sign(dy);
      while (Math.abs(targetY - player.y) > 0.001) {
        const move = Math.min(Math.abs(targetY - player.y), 1) * step;
        const candidate = { x: player.x, y: player.y + move, w: rect.w, h: rect.h };
        if (wouldHitSolid(candidate, startIgnored)) {
          if (dy > 0) player.grounded = true;
          player.vy = 0;
          break;
        }
        player.y += move;
      }
    }
  }

  function updateGrounded() {
    const probe = playerRect();
    probe.y += 1;
    const currentlyEmbedded = overlapsSolid(playerRect());
    player.grounded = player.state !== "permeating" && !currentlyEmbedded && overlapsSolid(probe);
    if (player.grounded) {
      player.coyoteTimer = CONFIG.COYOTE_FRAMES;
    }
  }

  function placePlayerAtTile(c, r) {
    player.x = c * TS + (TS - CONFIG.PLAYER_W) / 2;
    player.y = r * TS + TS - CONFIG.PLAYER_H;
  }

  function clearInputEdges() {
    for (const key in keyEdge) keyEdge[key] = false;
    for (const key in keyReleased) keyReleased[key] = false;
  }

  // === STEP (fixed dt) ===
  function step(dt) {
    time += dt;

    if (anyEdge(inputAliases.reset)) {
      spawnPlayer();
      clearInputEdges();
      return;
    }

    player.permeateCooldownTimer = Math.max(0, player.permeateCooldownTimer - dt);
    player.flashTimer = Math.max(0, player.flashTimer - dt);

    if (player.state !== "won") {
      if (!player.grounded) player.coyoteTimer = Math.max(0, player.coyoteTimer - 1);
      if (player.jumpBufferTimer > 0) player.jumpBufferTimer -= 1;
    }

    if (player.state === "stuck") {
      player.stuckTimer -= dt;
      if (player.stuckTimer <= 0) spawnPlayer();
      clearInputEdges();
      return;
    }

    if (player.state === "won") {
      clearInputEdges();
      return;
    }

    if (anyEdge(inputAliases.jump)) {
      player.jumpBufferTimer = CONFIG.JUMP_BUFFER_FRAMES;
    }

    const shiftDown = anyDown(inputAliases.shift);
    const shiftPressed = anyEdge(inputAliases.shift);
    const shiftReleased = anyReleased(inputAliases.shift);
    const jumpReleased = anyReleased(inputAliases.jump);
    const left = anyDown(inputAliases.left);
    const right = anyDown(inputAliases.right);
    const inputX = (right ? 1 : 0) - (left ? 1 : 0);
    let skipVerticalForces = false;

    if (shiftPressed && player.state === "permeating") {
      player.permeateUntilClear = false;
    }

    if (shiftDown && player.state === "solid" && player.permeateCooldownTimer <= 0) {
      player.state = "permeating";
      player.permeateUntilClear = false;
      player.grounded = false;
    }

    if (shiftReleased && player.state === "permeating" && !player.permeateUntilClear) {
      const rect = playerRect();
      const rebound = shouldRebound(rect);

      if (rebound.fire && rebound.stuck) {
        player.state = "stuck";
        player.stuckTimer = CONFIG.STUCK_DURATION;
        player.flashTimer = CONFIG.STUCK_DURATION;
        player.vx = 0;
        player.vy = 0;
        clearInputEdges();
        return;
      }

      if (rebound.fire) {
        // Rebound begins at rest: the launch speed is earned by buoyant
        // acceleration while the player is still embedded in the solid mass.
        player.state = "rebounding";
        player.vy = 0;
        player.reboundAirborneTimer = -1;
        skipVerticalForces = true;
      } else if (overlapsSolid(rect)) {
        // Head-only overlap means the player is nearly surfaced. The release is
        // remembered as "let me out" and the body remains intangible until clear.
        player.permeateUntilClear = true;
      } else {
        player.state = "solid";
      }
    }

    if (player.state === "permeating" && player.permeateUntilClear && !overlapsSolid(playerRect())) {
      player.permeateUntilClear = false;
      player.state = "solid";
    }

    if (inputX !== 0) {
      player.facing = inputX;
      const accel = CONFIG.MOVE_ACCEL * (player.state === "rebounding" ? CONFIG.REBOUND_AIR_CONTROL : 1);
      player.vx += inputX * accel;
    } else {
      player.vx = approach(player.vx, 0, CONFIG.MOVE_DECEL);
    }

    if (player.state !== "rebounding") {
      player.vx = clamp(player.vx, -CONFIG.MAX_RUN_SPEED, CONFIG.MAX_RUN_SPEED);
    }

    player.x = clamp(player.x, 0, LEVEL_W - CONFIG.PLAYER_W);

    if (player.jumpBufferTimer > 0 && player.coyoteTimer > 0 && player.state === "solid") {
      player.vy = CONFIG.JUMP_VELOCITY;
      player.grounded = false;
      player.coyoteTimer = 0;
      player.jumpBufferTimer = 0;
      skipVerticalForces = true;
    }

    if (jumpReleased && player.vy < CONFIG.JUMP_CUT_VELOCITY) {
      player.vy = CONFIG.JUMP_CUT_VELOCITY;
      skipVerticalForces = true;
    }

    const rectBeforeForces = playerRect();
    if (skipVerticalForces) {
      // Jump cuts and buoyant acceleration begin on the next fixed step. This
      // keeps edge-triggered state changes inspectable and makes rebound feel
      // like a force taking hold rather than a hidden one-frame launch impulse.
    } else if (player.state === "solid") {
      player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
    } else if (player.state === "permeating") {
      const extents = contiguousMassExtents(rectBeforeForces);
      if (player.permeateUntilClear) {
        // A released top-half-only overlap means "finish exiting." Do not let
        // the center-pull recapture the player inside a thin surface.
        player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
      } else if (extents) {
        // Permeation behaves like a viscous medium. Gravity is replaced by drag
        // and a center pull, so deep blocks feel controllable instead of like
        // free fall through terrain.
        player.vy *= 1 - CONFIG.PERMEATE_DRAG;
        const centerY = rectBeforeForces.y + rectBeforeForces.h / 2;
        if (centerY < extents.centerY - 1) player.vy += CONFIG.PERMEATE_PULL_ACCEL;
        else if (centerY > extents.centerY + 1) player.vy -= CONFIG.PERMEATE_PULL_ACCEL;
        else player.vy = approach(player.vy, 0, CONFIG.PERMEATE_PULL_ACCEL);
      } else {
        player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
      }
    } else if (player.state === "rebounding") {
      if (overlapsSolid(rectBeforeForces)) {
        // Buoyant sub-phase: only while embedded. This is deliberately an
        // acceleration, not a teleport or instant launch velocity, so deeper
        // releases naturally leave the surface with more upward speed.
        player.vy = Math.max(-CONFIG.BUOYANCY_MAX_SPEED, player.vy - CONFIG.BUOYANCY_ACCEL);
        player.reboundAirborneTimer = -1;
      } else {
        if (player.reboundAirborneTimer < 0) {
          player.reboundAirborneTimer = CONFIG.REBOUND_STATE_DURATION;
        }
        player.vy = Math.min(CONFIG.MAX_FALL_SPEED, player.vy + CONFIG.GRAVITY);
        player.reboundAirborneTimer -= dt;
      }
    }

    const embeddedBeforeMovement = overlapsSolid(playerRect());
    player.grounded = false;
    if (player.state === "permeating" || (player.state === "rebounding" && embeddedBeforeMovement)) {
      player.x += player.vx;
      player.y += player.vy;
    } else {
      moveAndCollide(player.vx, player.vy, { ignoreExisting: player.state === "rebounding" });
    }

    player.x = clamp(player.x, 0, LEVEL_W - CONFIG.PLAYER_W);
    updateGrounded();

    if (player.state === "rebounding") {
      const surfaced = !overlapsSolid(playerRect());
      if ((surfaced && player.reboundAirborneTimer <= 0) || player.grounded) {
        player.state = "solid";
        player.reboundAirborneTimer = -1;
        player.permeateCooldownTimer = CONFIG.PERMEATE_COOLDOWN;
      }
    }

    if (player.y > LEVEL_H + CONFIG.VIEW_H || player.y < -CONFIG.VIEW_H) {
      spawnPlayer();
    }

    if (rectsOverlap(playerRect(), goalRect)) {
      player.state = "won";
      player.won = true;
      player.vx = 0;
      player.vy = 0;
    }

    clearInputEdges();
  }

  // === RENDER ===
  function worldToScreenY(y) {
    return y - cameraY;
  }

  function drawBackground() {
    const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.VIEW_H);
    gradient.addColorStop(0, "#071727");
    gradient.addColorStop(0.55, "#07111d");
    gradient.addColorStop(1, "#090a10");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);

    ctx.fillStyle = "rgba(134, 221, 255, 0.22)";
    for (let i = 0; i < 70; i++) {
      const x = (i * 137 + Math.sin(time * 0.4 + i) * 8) % CONFIG.VIEW_W;
      const y = ((i * 83) % LEVEL_H - cameraY * (0.18 + (i % 5) * 0.035));
      const sy = ((y % CONFIG.VIEW_H) + CONFIG.VIEW_H) % CONFIG.VIEW_H;
      const s = 1 + (i % 3);
      ctx.globalAlpha = 0.25 + (i % 4) * 0.08;
      ctx.fillRect(x, sy, s, s);
    }
    ctx.globalAlpha = 1;
  }

  function drawTiles() {
    for (let r = 0; r < LEVEL_ROWS; r++) {
      const y = worldToScreenY(r * TS);
      if (y > CONFIG.VIEW_H || y + TS < 0) continue;
      for (let c = 0; c < LEVEL_COLS; c++) {
        if (!tiles[r][c]) continue;
        const x = c * TS;
        ctx.fillStyle = "#1c3045";
        ctx.fillRect(x, y, TS, TS);
        ctx.fillStyle = "#254764";
        ctx.fillRect(x, y, TS, 5);
        ctx.fillStyle = "#102030";
        ctx.fillRect(x, y + TS - 4, TS, 4);
        ctx.fillStyle = "rgba(105, 207, 255, 0.16)";
        ctx.fillRect(x + 2, y + 2, TS - 4, 1);
        ctx.strokeStyle = "rgba(0, 0, 0, 0.28)";
        ctx.strokeRect(x + 0.5, y + 0.5, TS - 1, TS - 1);
      }
    }
  }

  function drawGoal() {
    const x = goalRect.x;
    const y = worldToScreenY(goalRect.y);
    const pulse = 0.65 + Math.sin(time * 7) * 0.25;
    ctx.fillStyle = "#d5a11b";
    ctx.fillRect(x + 6, y + 4, 4, 36);
    ctx.fillStyle = "rgba(255, 220, 78, " + pulse + ")";
    ctx.fillRect(x + 10, y + 5, 18, 20);
    ctx.fillStyle = "#fff3a6";
    ctx.fillRect(x + 12, y + 8, 12, 4);
  }

  function drawPlayer() {
    const rect = playerRect();
    const x = rect.x;
    const y = worldToScreenY(rect.y);
    const permeating = player.state === "permeating";
    const rebounding = player.state === "rebounding";
    const stuck = player.state === "stuck" || player.flashTimer > 0;
    const pulse = 1 + Math.sin(time * 14) * 0.5;

    ctx.save();
    ctx.globalAlpha = permeating ? 0.4 : 1;
    ctx.fillStyle = stuck ? "#ff4f5f" : rebounding ? "#ffb14a" : "#f6fbff";
    ctx.fillRect(x, y, rect.w, rect.h);
    ctx.fillStyle = "#1a2430";
    ctx.fillRect(x + (player.facing > 0 ? 14 : 5), y + 10, 5, 5);
    ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
    ctx.fillRect(x + 4, y + rect.h - 9, rect.w - 8, 5);
    ctx.globalAlpha = 1;
    ctx.lineWidth = permeating ? 2 + pulse : 3;
    ctx.strokeStyle = stuck ? "#ff2c42" : rebounding ? "#ff8d24" : permeating ? "#3fe7ff" : "#9fb5c9";
    ctx.strokeRect(x - 1, y - 1, rect.w + 2, rect.h + 2);
    ctx.restore();
  }

  function drawHud() {
    const stateColors = {
      solid: "#edf5ff",
      permeating: "#43e6ff",
      rebounding: "#ffad42",
      stuck: "#ff4f5f",
      won: "#ffdd55"
    };
    const label = player.state === "won" ? "Won" : player.state[0].toUpperCase() + player.state.slice(1);

    ctx.font = "600 15px Inter, system-ui, sans-serif";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(4, 9, 16, 0.74)";
    ctx.fillRect(18, 18, 176, 46);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
    ctx.strokeRect(18.5, 18.5, 175, 45);
    ctx.fillStyle = stateColors[player.state] || "#fff";
    ctx.fillRect(32, 34, 12, 12);
    ctx.fillStyle = "#f3f7ff";
    ctx.fillText(label, 54, 40);

    if (player.permeateCooldownTimer > 0) {
      const w = 132 * (player.permeateCooldownTimer / CONFIG.PERMEATE_COOLDOWN);
      ctx.fillStyle = "rgba(67, 230, 255, 0.18)";
      ctx.fillRect(32, 56, 132, 4);
      ctx.fillStyle = "#43e6ff";
      ctx.fillRect(32, 56, w, 4);
    }

    ctx.font = "500 13px Inter, system-ui, sans-serif";
    ctx.fillStyle = "rgba(236, 244, 255, 0.76)";
    ctx.fillText("Move: ← / → or A / D", 716, 28);
    ctx.fillText("Jump: Space or W", 716, 48);
    ctx.fillText("Permeate: Shift", 716, 68);
    ctx.fillText("Rebound: Release Shift", 716, 88);
    ctx.fillText("Reset: R", 716, 108);
  }

  function drawOverlay() {
    if (!player.won) return;
    ctx.fillStyle = "rgba(2, 5, 10, 0.66)";
    ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffdd55";
    ctx.font = "800 52px Inter, system-ui, sans-serif";
    ctx.fillText("LEVEL COMPLETE", CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 - 22);
    ctx.fillStyle = "#f3f7ff";
    ctx.font = "600 18px Inter, system-ui, sans-serif";
    ctx.fillText("Press R to play again", CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 28);
    ctx.textAlign = "left";
  }

  function render() {
    const targetCameraY = clamp(player.y - CONFIG.VIEW_H * 0.55, 0, LEVEL_H - CONFIG.VIEW_H);
    cameraY = approach(cameraY, targetCameraY, 18);

    drawBackground();
    drawTiles();
    drawGoal();
    drawPlayer();
    drawHud();
    drawOverlay();
  }

  // === MAIN LOOP ===
  let last = performance.now();
  let accumulator = 0;
  const MAX_FRAME = 0.25;

  function frame(now) {
    accumulator += Math.min(MAX_FRAME, (now - last) / 1000);
    last = now;
    while (accumulator >= CONFIG.DT) {
      step(CONFIG.DT);
      accumulator -= CONFIG.DT;
    }
    render();
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);

  // Smoke harness hook. Browser play ignores this, but Node can extract the
  // script and drive the fixed-step simulation directly.
  window.__game = {
    CONFIG,
    LEVEL_DATA,
    LEVEL_ROWS,
    LEVEL_COLS,
    LEVEL_W,
    LEVEL_H,
    tiles,
    spawnCell,
    goalRect,
    player,
    keys,
    keyEdge,
    keyReleased,
    step,
    spawnPlayer,
    playerRect,
    bottomHalfRect,
    overlappingSolidTiles,
    shouldRebound,
    contiguousMassExtents,
    placePlayerAtTile,
    rectsOverlap
  };
  </script>
</body>
</html>
