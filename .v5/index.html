<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Permeation Buoyancy Platformer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Permeation Buoyancy Platformer">
        <canvas id="game" width="960" height="540"></canvas>
        <div class="hud" aria-live="polite">
          <div class="hud-panel">
            <span class="hud-label">State</span>
            <strong id="state">Solid</strong>
          </div>
          <div class="hud-panel">
            <span class="hud-label">Depth</span>
            <div class="meter" aria-hidden="true"><span id="depth"></span></div>
          </div>
          <div class="hud-panel compact">
            <span class="hud-label">Assist</span>
            <strong id="assist">Off</strong>
          </div>
        </div>
        <div id="banner" class="banner" hidden></div>
      </section>
    </main>

    <script src="src/game.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
